<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Experience Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#e7e5dd;}
  @keyframes gg{0%{background-position:0% 50%}100%{background-position:200% 50%}}
  @keyframes glowpulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:.85;transform:scale(1.02)}}
  ::-webkit-scrollbar{width:0;height:0;}

  .stage{
    --accent:#3D4ADE; --decision:#C8862A; --paper:#F4F3EE;
    min-height:100vh; display:grid; place-items:center; padding:44px;
    font-family:'IBM Plex Sans',sans-serif; color:#1A1A20;
    background:radial-gradient(130% 120% at 50% -10%, #f2f0e8 0%, #e4e2d9 60%, #dcdad0 100%);
  }

  .card{
    position:relative; width:1200px; max-width:96vw; height:760px;
    border-radius:32px; overflow:hidden; background:var(--paper);
    border:1px solid #E2E0D6;
    box-shadow:0 50px 120px -55px rgba(20,20,32,.55), 0 12px 40px -26px rgba(20,20,32,.4);
    outline:none; opacity:0;
  }
  .card::before{
    content:''; position:absolute; inset:0; pointer-events:none;
    background-image:radial-gradient(#dcdacf 1.2px, transparent 1.2px);
    background-size:44px 44px; opacity:.5;
  }
  .spot{
    position:absolute; inset:0; pointer-events:none; z-index:1;
    background:radial-gradient(560px circle at var(--mx,70%) var(--my,40%), color-mix(in srgb, var(--accent) 11%, transparent), transparent 62%);
  }

  .row{ position:relative; z-index:2; height:100%; display:flex; flex-direction:row; }

  .content{ flex:1; min-width:0; padding:54px 50px 42px; display:flex; flex-direction:column; min-height:0; }
  .parallax{ will-change:transform; display:flex; flex-direction:column; min-height:0; flex:1; }

  /* ---- role: full (overview) ---- */
  .eyebrow{ display:flex; align-items:center; gap:16px; margin-bottom:26px; flex:none; }
  .eyebrow .tag{ font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); }
  .eyebrow .line{ height:2px; width:70px; border-radius:2px; background:linear-gradient(90deg, var(--accent), transparent, var(--accent)); background-size:200% 100%; animation:gg 3.2s linear infinite; }
  .eyebrow .date{ font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.1em; color:#9a988e; }

  .roleFull h2{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:38px; line-height:1.08; margin:0 0 12px; letter-spacing:-.025em; max-width:640px; }
  .roleFull .company{ font-family:'IBM Plex Mono',monospace; font-size:13px; color:#6B6B73; margin-bottom:4px; }
  .roleFull .program{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:#9a988e; margin-bottom:18px; }
  .roleFull .lede{ margin:0; font-size:17px; line-height:1.55; color:#3a3a44; max-width:520px; text-wrap:pretty; }

  /* ---- role: compact bar (focused) ---- */
  .roleBar{
    flex:none; display:flex; align-items:center; gap:12px; margin:-8px -10px 0; padding:8px 10px;
    border:none; background:transparent; cursor:pointer; text-align:left; border-radius:12px;
    transition:background .2s;
  }
  .roleBar:hover{ background:rgba(20,20,32,.04); }
  .roleBar .backIcon{
    flex:none; width:26px; height:26px; border-radius:99px; border:1.5px solid #cdcbc1; color:#6B6B73;
    display:grid; place-items:center; font-size:13px; transition:border-color .2s, color .2s;
  }
  .roleBar:hover .backIcon{ border-color:var(--accent); color:var(--accent); }
  .roleBar .roleBarTitle{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; color:#1A1A20; letter-spacing:-.01em; }
  .roleBar .roleBarSep{ color:#cdcbc1; margin:0 8px; }
  .roleBar .roleBarCompany{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:#9a988e; }

  .divider{ height:1px; background:#E2E0D6; margin:28px 0 26px; flex:none; }

  /* ---- overview hint (fills space under role, before footer) ---- */
  .overviewHint{ flex:1; min-height:0; display:flex; flex-direction:column; justify-content:center; }
  .hintLabel{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:16px; }
  .hintTags{ display:flex; flex-wrap:wrap; gap:10px; max-width:560px; }
  .tagPill{
    font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:13.5px; color:#3a3a44;
    background:#fff; border:1px solid #E2E0D6; border-radius:99px; padding:9px 16px; cursor:pointer;
    display:flex; align-items:center; gap:8px; transition:border-color .2s, color .2s, transform .2s;
  }
  .tagPill:hover{ border-color:var(--accent); color:var(--accent); transform:translateY(-1px); }

  /* ---- project focus ---- */
  .projectFocus{ flex:1; min-height:0; display:flex; flex-direction:column; justify-content:flex-start; padding-top:4px; }
  .detail{ min-width:0; will-change:transform; }
  .pill{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); background:color-mix(in srgb, var(--accent) 12%, transparent); padding:5px 12px; border-radius:99px; margin-bottom:14px; }
  h3{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:29px; line-height:1.16; margin:0 0 22px; letter-spacing:-.02em; }

  .ba{ display:flex; flex-direction:column; gap:14px; max-width:520px; }
  .baCol{ min-width:0; }
  .baLabel{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; font-weight:500; margin-bottom:8px; }
  .baCol.before .baLabel{ color:#9a988e; }
  .baCol.after .baLabel{ color:var(--decision); }
  .baText{ margin:0; font-size:16.5px; line-height:1.5; color:#3a3a44; text-wrap:pretty; }
  .baCol.before .baText{ color:#6B6B73; }
  .baArrow{ align-self:flex-start; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16px; line-height:1; color:var(--accent); transform:rotate(90deg); margin-left:2px; }

  .footer{ display:flex; align-items:center; gap:13px; margin-top:24px; flex:none; }
  .navBtn{ width:44px; height:44px; border-radius:99px; border:1.5px solid #1A1A20; background:#fff; color:#1A1A20; cursor:pointer; display:grid; place-items:center; font-size:17px; transition:transform .28s cubic-bezier(.34,1.5,.5,1), background .2s, color .2s; }
  .navBtn:hover{ background:#1A1A20; color:#fff; }
  .dots{ display:flex; gap:7px; align-items:center; margin-left:8px; }
  .dot{ width:8px; height:8px; border-radius:99px; border:none; padding:0; cursor:pointer; background:#cdcbc1; transition:all .4s cubic-bezier(.34,1.4,.5,1); }
  .dot.active{ width:26px; background:var(--accent); }
  .spacer{ flex:1; }
  .hint{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9a988e; letter-spacing:.04em; }

  .carousel{ position:relative; width:430px; flex:none; align-self:stretch; overflow:hidden; touch-action:none; }
  .carousel::before{
    content:''; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(85% 60% at 62% 50%, color-mix(in srgb, var(--accent) 5%, transparent), transparent 72%);
  }
  .chip{ position:absolute; top:50%; width:294px; cursor:pointer; }
  .chip .box{ position:relative; background:rgba(255,255,255,.62); border:1px solid #E2E0D6; border-radius:16px; padding:16px 18px; box-shadow:0 8px 22px -16px rgba(20,20,32,.4); backdrop-filter:blur(3px); transition:background .3s, border-color .3s, border-radius .3s, padding .3s, box-shadow .3s; }
  .chip.foc .box{ background:#fff; border:2px solid var(--accent); border-radius:18px; padding:18px 20px; box-shadow:0 28px 62px -28px var(--accent), 0 6px 18px -12px rgba(20,20,32,.3); }
  .chip .glow{ position:absolute; inset:-3px; border-radius:20px; box-shadow:0 0 0 1.5px var(--accent); animation:glowpulse 2.6s ease-in-out infinite; pointer-events:none; display:none; }
  .chip.foc .glow{ display:block; }
  .chip .meta{ display:flex; align-items:center; gap:10px; position:relative; }
  .chip .tag2{ font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.09em; text-transform:uppercase; color:#9a988e; }
  .chip .title2{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; line-height:1.24; margin-top:9px; letter-spacing:-.01em; color:#6B6B73; position:relative; transition:color .3s, font-size .3s; }
  .chip.foc .title2{ font-size:17px; color:#1A1A20; }
</style>
</head>
<body>
<div class="stage">
  <div class="card" id="card" tabindex="0">
    <div class="spot" id="spot"></div>
    <div class="row" id="row">
      <div class="content">
        <div class="parallax" id="parallax">

          <button class="roleBar" id="roleBar" style="display:none;">
            <span class="backIcon">←</span>
            <span>
              <span class="roleBarTitle" id="roleBarTitle"></span>
              <span class="roleBarSep">·</span>
              <span class="roleBarCompany">Orange Business</span>
            </span>
          </button>

          <div class="roleFull" id="roleFull">
            <div class="eyebrow">
              <span class="tag">Experience 03</span>
              <span class="line"></span>
              <span class="date">Sept 2025 — Present</span>
            </div>
            <h2 id="roleTitle">Head of Customer Contract Management, Benelux</h2>
            <div class="company">Orange Business · Netherlands</div>
            <div class="program">Orange Graduate Program rotation</div>
            <p class="lede">Lead a team of 10 running request-to-cash operations for international B2B accounts.</p>
          </div>

          <div class="divider"></div>

          <div class="overviewHint" id="overviewHint">
            <div class="hintLabel">What I drove in this role</div>
            <div class="hintTags" id="hintTags"></div>
          </div>

          <div class="projectFocus" id="projectFocus" style="display:none;">
            <div class="detail" id="detail">
              <span class="pill" id="curTag"></span>
              <h3 id="curTitle"></h3>
              <div class="ba">
                <div class="baCol before">
                  <div class="baLabel">Before</div>
                  <p class="baText" id="curBefore"></p>
                </div>
                <div class="baArrow">→</div>
                <div class="baCol after">
                  <div class="baLabel">After</div>
                  <p class="baText" id="curAfter"></p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="footer">
          <button class="navBtn mag" id="prevBtn">↑</button>
          <button class="navBtn mag" id="nextBtn">↓</button>
          <div class="dots" id="dots"></div>
          <div class="spacer"></div>
          <span class="hint" id="hint">scroll · drag · click</span>
        </div>
      </div>

      <div class="carousel" id="carousel"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const ACCENT = '#3D4ADE';
  const DECISION = '#C8862A';
  const REDUCED_MOTION = false;
  const ARC_SIDE = 1; // 1 = right, -1 = left
  const ROLE_TITLE = 'Head of Customer Contract Management, Benelux';

  const projects = [
    { tag:'Strategy', title:'Setting a clear strategic goal',
      before:'The team was buried in execution, with little room for higher-value work or a real strategic voice.',
      after:'Defined a clear goal around autonomy, ownership and partnership — shifting energy toward work that creates real value.' },
    { tag:'Governance', title:'Designing a clearer operating model',
      before:'Roles between contract managers and their operational support were unclear, causing friction and heavy reliance on individuals.',
      after:'Defined ownership, escalation paths and where each role adds value — less friction, and a model that scales.' },
    { tag:'Change management', title:'Leading an outsourcing transition',
      before:'The team was being transferred to an external partner, with real risk to continuity, morale and client relationships.',
      after:'Aligned leadership on what success looks like and secured continuity plans — zero disruption for customers through the change.' },
    { tag:'Culture', title:'Building a genuine team',
      before:"The team worked more with other roles than with each other — it didn't really function as one unit.",
      after:'Ran a retrospective that surfaced what held us back and turned it into owned, follow-up initiatives.' },
    { tag:'Development', title:'Coaching and upskilling',
      before:'No clear picture of where each person stood against what the role actually requires.',
      after:'A structured skills self-assessment gave the team an honest map of the gaps to work on.' },
    { tag:'Automation', title:'Digitizing the request process',
      before:'Customer requests came in by email and had to be re-entered manually across our systems.',
      after:'Rolled out a digital platform with an automated workflow — faster, transparent, and far less error-prone.' },
  ];

  let active = 0;
  let focused = false;
  const total = projects.length;

  const cardEl = document.getElementById('card');
  const rowEl = document.getElementById('row');
  const spotEl = document.getElementById('spot');
  const parallaxEl = document.getElementById('parallax');
  const detailEl = document.getElementById('detail');
  const carEl = document.getElementById('carousel');
  const dotsEl = document.getElementById('dots');
  const hintEl = document.getElementById('hint');
  const roleBarEl = document.getElementById('roleBar');
  const roleFullEl = document.getElementById('roleFull');
  const overviewHintEl = document.getElementById('overviewHint');
  const projectFocusEl = document.getElementById('projectFocus');
  const hintTagsEl = document.getElementById('hintTags');

  cardEl.style.setProperty('--accent', ACCENT);
  cardEl.style.setProperty('--decision', DECISION);
  rowEl.style.flexDirection = ARC_SIDE === 1 ? 'row' : 'row-reverse';
  document.getElementById('roleBarTitle').textContent = ROLE_TITLE;
  document.getElementById('roleTitle').textContent = ROLE_TITLE;

  function clamp(i){ return Math.max(0, Math.min(total - 1, i)); }

  function selectProject(i){
    active = clamp(i);
    focused = true;
    render(true);
  }

  function goOverview(){
    focused = false;
    render(true);
  }

  function step(d){
    if (!focused){ focused = true; render(true); return; }
    if (d < 0 && active === 0){ goOverview(); return; }
    const next = clamp(active + d);
    if (next === active) return;
    active = next;
    render(true);
  }

  function fadeIn(el, dir){
    if (REDUCED_MOTION || !el) return;
    el.animate(
      [{ opacity:0, transform:`translateY(${dir*16}px)` }, { opacity:1, transform:'none' }],
      { duration:460, easing:'cubic-bezier(.22,.61,.36,1)' });
  }

  function render(animateMode){
    // role area
    roleBarEl.style.display = focused ? 'flex' : 'none';
    roleFullEl.style.display = focused ? 'none' : '';
    overviewHintEl.style.display = focused ? 'none' : 'flex';
    projectFocusEl.style.display = focused ? 'flex' : 'none';

    if (focused){
      const p = projects[active];
      document.getElementById('curTag').textContent = p.tag;
      document.getElementById('curTitle').textContent = p.title;
      document.getElementById('curBefore').textContent = p.before;
      document.getElementById('curAfter').textContent = p.after;
      hintEl.textContent = 'scroll · drag · click';
      if (animateMode){ fadeIn(detailEl, 1); }
    } else {
      hintEl.textContent = 'scroll · drag · click to explore';
      if (animateMode){ fadeIn(roleFullEl, -1); fadeIn(overviewHintEl, -1); }
    }

    renderDots();
    renderChips();
  }

  function renderDots(){
    dotsEl.innerHTML = '';
    projects.forEach((p, i) => {
      const b = document.createElement('button');
      b.className = 'dot' + (focused && i === active ? ' active' : '');
      b.addEventListener('click', () => selectProject(i));
      dotsEl.appendChild(b);
    });
  }

  function renderHintTags(){
    hintTagsEl.innerHTML = '';
    projects.forEach((p, i) => {
      const b = document.createElement('button');
      b.className = 'tagPill';
      b.textContent = p.tag;
      b.addEventListener('click', () => selectProject(i));
      hintTagsEl.appendChild(b);
    });
  }

  const R = 272, STEP = 26 * Math.PI / 180, PULL = 20;

  function renderChips(){
    carEl.innerHTML = '';
    projects.forEach((p, i) => {
      const off = i - active, ao = Math.abs(off), foc = focused && off === 0;
      const a = off * STEP;
      const x = R - R * Math.cos(a), y = R * Math.sin(a);
      const scale = Math.max(.6, 1 - ao * .17);
      const op = Math.max(0, 1 - ao * .3);
      const blur = (ao * 1.1).toFixed(1);
      const z = 100 - ao;
      let anchor, tX;
      if (ARC_SIDE === 1){ anchor = 'left'; tX = foc ? -PULL : x; }
      else { anchor = 'right'; tX = foc ? PULL : -x; }

      const chip = document.createElement('div');
      chip.className = 'chip' + (foc ? ' foc' : '');
      chip.style.cssText = `${anchor}:30px;z-index:${z};opacity:${op.toFixed(3)};filter:blur(${blur}px);transform:translate(${tX.toFixed(1)}px, calc(-50% + ${y.toFixed(1)}px)) scale(${scale.toFixed(3)});${REDUCED_MOTION ? '' : 'transition:transform .74s cubic-bezier(.34,1.42,.5,1),opacity .5s ease,filter .5s ease;'}`;
      chip.addEventListener('click', () => selectProject(i));

      chip.innerHTML = `
        <div class="box">
          <div class="glow"></div>
          <div class="meta">
            <span class="tag2">${p.tag}</span>
          </div>
          <div class="title2">${p.title}</div>
        </div>`;
      carEl.appendChild(chip);
    });
  }

  // wheel navigation
  let lastWheel = 0;
  cardEl.addEventListener('wheel', e => {
    e.preventDefault();
    const now = Date.now();
    if (now - lastWheel < 320) return;
    lastWheel = now;
    step((e.deltaY || e.deltaX) > 0 ? 1 : -1);
  }, { passive:false });

  // cursor spotlight + parallax
  cardEl.addEventListener('mousemove', e => {
    const r = cardEl.getBoundingClientRect();
    const mx = (e.clientX - r.left) / r.width, my = (e.clientY - r.top) / r.height;
    spotEl.style.setProperty('--mx', (mx*100).toFixed(1) + '%');
    spotEl.style.setProperty('--my', (my*100).toFixed(1) + '%');
    if (!REDUCED_MOTION)
      parallaxEl.style.transform = `translate(${((mx-.5)*10).toFixed(1)}px, ${((my-.5)*7).toFixed(1)}px)`;
  });

  // keyboard navigation
  cardEl.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight'){ e.preventDefault(); step(1); }
    else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft'){ e.preventDefault(); step(-1); }
    else if (e.key === 'Escape' && focused){ e.preventDefault(); goOverview(); }
  });

  // drag navigation on carousel
  let dragging = false, dragY = 0;
  carEl.addEventListener('pointerdown', e => {
    dragging = true; dragY = e.clientY;
    try{ carEl.setPointerCapture(e.pointerId); }catch(_){}
  });
  carEl.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dd = e.clientY - dragY;
    if (Math.abs(dd) > 42){ step(dd > 0 ? 1 : -1); dragY = e.clientY; }
  });
  carEl.addEventListener('pointerup', () => { dragging = false; });
  carEl.addEventListener('pointercancel', () => { dragging = false; });

  // magnetic buttons
  document.querySelectorAll('.mag').forEach(b => {
    b.addEventListener('mousemove', e => {
      const r = b.getBoundingClientRect();
      b.style.transform = `translate(${((e.clientX-r.left-r.width/2)*.35).toFixed(1)}px, ${((e.clientY-r.top-r.height/2)*.35).toFixed(1)}px)`;
    });
    b.addEventListener('mouseleave', () => { b.style.transform = 'translate(0,0)'; });
  });
  document.getElementById('prevBtn').addEventListener('click', () => step(-1));
  document.getElementById('nextBtn').addEventListener('click', () => step(1));
  roleBarEl.addEventListener('click', goOverview);

  // init
  renderHintTags();
  render(false);

  if (!REDUCED_MOTION){
    cardEl.animate(
      [{ opacity:0, transform:'scale(.985) translateY(12px)' }, { opacity:1, transform:'none' }],
      { duration:680, easing:'cubic-bezier(.22,.61,.36,1)', fill:'forwards' });
  } else {
    cardEl.style.opacity = 1;
  }
})();
</script>
</body>
</html>
