<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Layout — pozície a projekty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F7F4;
  --ink:#14181A;
  --ink-2:#5C6360;
  --ink-3:#8E948E;
  --hair:#DCDFD8;
  --deep:#1B2A21;
  --deep-2:#A9BCAD;
  --moss:#3E6B4A;
  --moss-soft:#E9F0E9;
  --bar:56px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important}}
body{
  margin:0;background:var(--paper);color:var(--ink);
  font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:16px;line-height:1.7;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1180px;margin:0 auto;padding:0 32px}
.mono{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase}

/* ---------- lede ---------- */
.lede{padding:14vh 0 8vh}
.lede h1{
  font-family:"Instrument Serif",Georgia,serif;font-weight:400;
  font-size:clamp(2.2rem,5.5vw,3.8rem);line-height:1.08;margin:0 0 20px;max-width:16ch;
}
.lede p{margin:0;max-width:52ch;color:var(--ink-2)}

/* ---------- rozcestník ---------- */
.index{border-top:1px solid var(--hair);margin-bottom:12vh}
.index a{
  display:grid;grid-template-columns:56px 1fr auto;gap:20px;align-items:baseline;
  padding:22px 0;border-bottom:1px solid var(--hair);
  text-decoration:none;color:var(--ink);transition:background .18s,padding .18s;
}
.index a:hover,.index a:focus-visible{background:var(--moss-soft);padding-left:14px;padding-right:14px}
.index .n{color:var(--moss)}
.index .t{font-size:clamp(1.15rem,2.4vw,1.6rem);font-family:"Instrument Serif",Georgia,serif}
.index .t small{display:block;font-family:"IBM Plex Sans",sans-serif;font-size:14px;color:var(--ink-2);margin-top:2px}
.index .y{color:var(--ink-3)}

/* ---------- lepiaca lišta ---------- */
.railbar{
  position:fixed;top:0;left:0;right:0;height:var(--bar);z-index:40;
  background:rgba(246,247,244,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--hair);
  display:flex;align-items:center;
  opacity:0;transform:translateY(-100%);transition:opacity .25s,transform .25s;pointer-events:none;
}
.railbar.on{opacity:1;transform:none;pointer-events:auto}
.railbar .wrap{display:flex;gap:8px;width:100%;overflow-x:auto;scrollbar-width:none}
.railbar .wrap::-webkit-scrollbar{display:none}
.railbar button{
  flex:0 0 auto;background:none;border:1px solid var(--hair);border-radius:999px;
  padding:6px 14px;cursor:pointer;color:var(--ink-2);white-space:nowrap;
  font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.05em;
  transition:.18s;
}
.railbar button:hover{border-color:var(--moss);color:var(--moss)}
.railbar button.on{background:var(--deep);border-color:var(--deep);color:var(--paper)}

/* ---------- predel ---------- */
.opener{
  background:var(--deep);color:var(--paper);
  margin:0 -50vw;padding:16vh 50vw;scroll-margin-top:var(--bar);
}
.opener .inner{max-width:1180px;margin:0 auto;padding:0 32px}
.opener .n{color:var(--deep-2);margin-bottom:24px;display:block}
.opener h2{
  font-family:"Instrument Serif",Georgia,serif;font-weight:400;
  font-size:clamp(2.6rem,7vw,5.2rem);line-height:1.02;margin:0 0 4px;max-width:14ch;
}
.opener .meta{color:var(--deep-2);margin:0 0 28px}
.opener p.desc{max-width:46ch;color:#D7E0D8;margin:0 0 32px}
.opener .count{display:inline-flex;align-items:center;gap:10px;color:var(--deep-2)}

/* ---------- práca: sticky split ---------- */
.work{display:grid;grid-template-columns:320px 1fr;gap:72px;padding:12vh 0}
.rail{position:sticky;top:calc(var(--bar) + 40px);align-self:start}
.rail .eyebrow{
  display:flex;gap:10px;align-items:baseline;
  padding-bottom:14px;margin-bottom:22px;border-bottom:1px solid var(--hair);
}
.rail .eyebrow .n{color:var(--moss)}
.rail .eyebrow .nm{font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}
.rail ol{list-style:none;margin:0;padding:0}
.rail li{margin-bottom:2px}
.rail button{
  width:100%;text-align:left;background:none;border:0;cursor:pointer;
  display:grid;grid-template-columns:32px 1fr;gap:12px;
  padding:12px 12px 12px 14px;border-left:2px solid transparent;
  color:var(--ink-3);font-family:inherit;font-size:15px;line-height:1.45;transition:.2s;
}
.rail button .n{font-family:"IBM Plex Mono",monospace;font-size:12px;padding-top:2px}
.rail button .sub{display:block;font-size:13px;color:var(--ink-3);margin-top:2px;opacity:0}
.rail button:hover{color:var(--ink-2)}
.rail button.on{color:var(--ink);border-left-color:var(--moss);background:var(--moss-soft)}
.rail button.on .n{color:var(--moss)}
.rail button.on .sub{opacity:1;color:var(--ink-2)}

.stream{min-width:0}
.stream article{
  min-height:66vh;padding-bottom:14vh;scroll-margin-top:calc(var(--bar) + 40px);
}
.stream .tag{color:var(--moss);margin-bottom:18px;display:block}
.stream h3{
  font-family:"Instrument Serif",Georgia,serif;font-weight:400;
  font-size:clamp(1.7rem,3.4vw,2.5rem);line-height:1.12;margin:0 0 22px;max-width:20ch;
}
.stream .facts{display:flex;flex-wrap:wrap;gap:0;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);margin:0 0 30px}
.stream .facts div{padding:14px 28px 14px 0;margin-right:28px}
.stream .facts dt{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px}
.stream .facts dd{margin:0;font-size:15px}
.stream p{max-width:62ch;margin:0 0 20px;color:var(--ink-2)}
.stream .result{
  border-left:2px solid var(--moss);padding:4px 0 4px 20px;margin-top:30px;
  max-width:56ch;color:var(--ink);
  font-family:"Instrument Serif",Georgia,serif;font-style:italic;font-size:1.25rem;line-height:1.5;
}
.shot{
  aspect-ratio:16/9;background:#EDEFEA;border:1px solid var(--hair);border-radius:3px;
  display:flex;align-items:center;justify-content:center;color:var(--ink-3);margin:0 0 30px;
}
footer{border-top:1px solid var(--hair);padding:8vh 0 14vh;color:var(--ink-3)}

@media (max-width:900px){
  .wrap{padding:0 20px}
  .work{grid-template-columns:1fr;gap:36px;padding:8vh 0}
  .rail{position:static}
  .rail button .sub{opacity:1}
  .stream article{min-height:0;padding-bottom:9vh}
  .opener{padding:11vh 50vw}
  .opener .inner{padding:0 20px}
  .index a{grid-template-columns:38px 1fr;gap:14px}
  .index .y{grid-column:2;color:var(--ink-3)}
}
:focus-visible{outline:2px solid var(--moss);outline-offset:3px}
</style>
</head>
<body>

<div class="railbar" id="railbar">
  <div class="wrap" id="pills"></div>
</div>

<div class="wrap">
  <header class="lede">
    <h1>Štyri pozície, dvanásť vecí, ktoré po mne zostali</h1>
    <p>Placeholder úvod — jedna až dve vety o tom, čo tieto roly spája. Zoznam nižšie je klikateľný; nemusíš prejsť ničím, čo ťa nezaujíma.</p>
  </header>

  <nav class="index" id="index"></nav>
</div>

<main id="main"></main>

<div class="wrap"><footer><span class="mono">Placeholder pätička</span></footer></div>

<script>
const DATA = [
  {
    id:"analyst", n:"01", name:"Data analyst", place:"Bratislava", years:"2015–2018",
    desc:"Placeholder popis roly — dve až tri vety o tom, čo bola úloha, aký veľký bol kontext a čo som si z toho odniesla.",
    projects:[
      {t:"Prestavba mesačného reportingu", sub:"Zo štyroch dní na štyri hodiny", facts:[["Rola","Analytik"],["Rok","2016"],["Rozsah","3 tímy"]],
       p:["Placeholder odstavec o východiskovej situácii. Čo nefungovalo, prečo to nikomu nevadilo a čo sa stalo, keď to začalo vadiť.",
          "Placeholder odstavec o tom, čo som spravila. Konkrétne kroky, nie abstraktné slovesá."],
       r:"Výsledok v jednej vete, ideálne s číslom."},
      {t:"Segmentácia zákazníckej bázy", sub:"Prvý model, ktorý sa naozaj používal", facts:[["Rola","Analytik"],["Rok","2017"],["Rozsah","40 tis. účtov"]],
       p:["Placeholder odstavec o zadaní a o tom, čo bolo na ňom neisté.",
          "Placeholder odstavec o postupe a o jednej veci, ktorá nevyšla."],
       r:"Výsledok v jednej vete, ideálne s číslom."},
      {t:"Dashboard pre obchodný tím", sub:"Tridsať používateľov, nula školení", facts:[["Rola","Analytik"],["Rok","2018"],["Rozsah","30 ľudí"]],
       p:["Placeholder odstavec o tom, prečo predchádzajúce riešenia nikto neotváral.",
          "Placeholder odstavec o návrhu a o tom, ako som overila, že to ľudia naozaj používajú."],
       r:"Výsledok v jednej vete, ideálne s číslom."}
    ]
  },
  {
    id:"ci", n:"02", name:"Continuous improvement", place:"Kuala Lumpur", years:"2018–2021",
    desc:"Placeholder popis roly — dve až tri vety. Tu je priestor povedať, čo bolo na tomto prostredí iné a čo ma to naučilo.",
    projects:[
      {t:"Mapovanie objednávkového procesu", sub:"Sedem krokov, z ktorých tri nikto nepotreboval", facts:[["Rola","Lean facilitátor"],["Rok","2019"],["Rozsah","5 krajín"]],
       p:["Placeholder odstavec o tom, ako sa proces javil na papieri a ako vyzeral v skutočnosti.",
          "Placeholder odstavec o workshope a o tom, kto sa bránil a prečo."],
       r:"Výsledok v jednej vete, ideálne s číslom."},
      {t:"Štandardizácia eskalácií", sub:"Jedna cesta namiesto jedenástich", facts:[["Rola","Lean facilitátor"],["Rok","2019"],["Rozsah","2 regióny"]],
       p:["Placeholder odstavec o probléme.","Placeholder odstavec o riešení."],
       r:"Výsledok v jednej vete, ideálne s číslom."},
      {t:"Program zlepšovacích návrhov", sub:"Od nápadu k zavedeniu za šesť týždňov", facts:[["Rola","Vlastník programu"],["Rok","2020"],["Rozsah","120 ľudí"]],
       p:["Placeholder odstavec o probléme.","Placeholder odstavec o riešení."],
       r:"Výsledok v jednej vete, ideálne s číslom."},
      {t:"Prechod tímu na prácu na diaľku", sub:"Marec 2020, dva týždne", facts:[["Rola","Koordinátor"],["Rok","2020"],["Rozsah","60 ľudí"]],
       p:["Placeholder odstavec o probléme.","Placeholder odstavec o riešení."],
       r:"Výsledok v jednej vete, ideálne s číslom."}
    ]
  },
  {
    id:"ops", n:"03", name:"Customer operations lead", place:"Amsterdam", years:"2021–2024",
    desc:"Placeholder popis roly — prvá rola, kde som viedla ľudí namiesto procesov. Dve až tri vety o tom, čo to znamenalo.",
    projects:[
      {t:"Zlúčenie dvoch tímov", sub:"Dve krajiny, dva spôsoby hovoriť nahlas", facts:[["Rola","Vedúca"],["Rok","2021"],["Rozsah","18 ľudí"]],
       p:["Placeholder odstavec o probléme.","Placeholder odstavec o riešení."],
       r:"Výsledok v jednej vete, ideálne s číslom."},
      {t:"Nový model obsluhy kľúčových klientov", sub:"Menej stretnutí, viac rozhodnutí", facts:[["Rola","Vedúca"],["Rok","2022"],["Rozsah","12 klientov"]],
       p:["Placeholder odstavec o probléme.","Placeholder odstavec o riešení."],
       r:"Výsledok v jednej vete, ideálne s číslom."},
      {t:"Plán nástupníctva", sub:"Kto to robí, keď tam nie som", facts:[["Rola","Vedúca"],["Rok","2022"],["Rozsah","4 roly"]],
       p:["Placeholder odstavec o probléme.","Placeholder odstavec o riešení."],
       r:"Výsledok v jednej vete, ideálne s číslom."},
      {t:"Automatizácia zmluvných kontrol", sub:"Ľudia na výnimky, nie na kontrolu", facts:[["Rola","Zadávateľka"],["Rok","2023"],["Rozsah","900 zmlúv"]],
       p:["Placeholder odstavec o probléme.","Placeholder odstavec o riešení."],
       r:"Výsledok v jednej vete, ideálne s číslom."},
      {t:"Ročný plán kapacít", sub:"Prvý, ktorý sedel", facts:[["Rola","Vedúca"],["Rok","2023"],["Rozsah","3 tímy"]],
       p:["Placeholder odstavec o probléme.","Placeholder odstavec o riešení."],
       r:"Výsledok v jednej vete, ideálne s číslom."}
    ]
  },
  {
    id:"ccm", n:"04", name:"Head of contract management", place:"Amsterdam", years:"2024–",
    desc:"Placeholder popis roly — dve až tri vety o rozsahu, tíme a o tom, čo je v tejto rope naozaj ťažké.",
    projects:[
      {t:"Príprava tímu na prechod k dodávateľovi", sub:"Deväť mesiacov neistoty", facts:[["Rola","Head of"],["Rok","2025"],["Rozsah","22 ľudí"]],
       p:["Placeholder odstavec o probléme.","Placeholder odstavec o riešení."],
       r:"Výsledok v jednej vete, ideálne s číslom."},
      {t:"Plán zachovania prevádzky", sub:"Čo keď odídu traja naraz", facts:[["Rola","Head of"],["Rok","2025"],["Rozsah","2 krajiny"]],
       p:["Placeholder odstavec o probléme.","Placeholder odstavec o riešení."],
       r:"Výsledok v jednej vete, ideálne s číslom."},
      {t:"Manažérsky offsite", sub:"Rozhovor, ktorému sa nikto nechcel venovať", facts:[["Rola","Facilitátorka"],["Rok","2025"],["Rozsah","9 manažérov"]],
       p:["Placeholder odstavec o probléme.","Placeholder odstavec o riešení."],
       r:"Výsledok v jednej vete, ideálne s číslom."},
      {t:"Prezentácia pre vedenie", sub:"Štruktúra namiesto obhajoby", facts:[["Rola","Head of"],["Rok","2026"],["Rozsah","Board"]],
       p:["Placeholder odstavec o probléme.","Placeholder odstavec o riešení."],
       r:"Výsledok v jednej vete, ideálne s číslom."}
    ]
  }
];

const esc = s => s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

document.getElementById('index').innerHTML = DATA.map(p => `
  <a href="#pos-${p.id}">
    <span class="mono n">${p.n}</span>
    <span class="t">${esc(p.name)}<small>${esc(p.place)} · ${p.projects.length} projekty</small></span>
    <span class="mono y">${p.years}</span>
  </a>`).join('');

document.getElementById('pills').innerHTML = DATA.map(p =>
  `<button data-go="pos-${p.id}">${p.n} · ${esc(p.name)}</button>`).join('');

document.getElementById('main').innerHTML = DATA.map(p => `
  <section class="position" data-pos="${p.id}">
    <div class="opener" id="pos-${p.id}">
      <div class="inner">
        <span class="mono n">${p.n} / ${DATA.length}</span>
        <h2>${esc(p.name)}</h2>
        <p class="meta">${esc(p.place)} · ${p.years}</p>
        <p class="desc">${esc(p.desc)}</p>
        <span class="mono count">${p.projects.length} projekty ↓</span>
      </div>
    </div>
    <div class="wrap">
      <div class="work">
        <aside class="rail">
          <div class="eyebrow"><span class="mono n">${p.n}</span><span class="nm">${esc(p.name)}</span></div>
          <ol>${p.projects.map((pr,i) => `
            <li><button data-go="${p.id}-${i}">
              <span class="n">${String(i+1).padStart(2,'0')}</span>
              <span>${esc(pr.t)}<span class="sub">${esc(pr.sub)}</span></span>
            </button></li>`).join('')}
          </ol>
        </aside>
        <div class="stream">${p.projects.map((pr,i) => `
          <article id="${p.id}-${i}" data-pos="${p.id}" data-i="${i}">
            <span class="mono tag">${p.n} ${esc(p.name)} — projekt ${String(i+1).padStart(2,'0')}</span>
            <h3>${esc(pr.t)}</h3>
            <dl class="facts">${pr.facts.map(f => `<div><dt>${esc(f[0])}</dt><dd>${esc(f[1])}</dd></div>`).join('')}</dl>
            <div class="shot"><span class="mono">obrázok / graf</span></div>
            ${pr.p.map(t => `<p>${esc(t)}</p>`).join('')}
            <p class="result">${esc(pr.r)}</p>
          </article>`).join('')}
        </div>
      </div>
    </div>
  </section>`).join('');

document.addEventListener('click', e => {
  const b = e.target.closest('[data-go]');
  if (b) document.getElementById(b.dataset.go)?.scrollIntoView({block:'start'});
});

const bar = document.getElementById('railbar');
new IntersectionObserver(([e]) => bar.classList.toggle('on', !e.isIntersecting),
  {rootMargin:'-56px 0px 0px 0px'}).observe(document.getElementById('index'));

const pills = [...document.querySelectorAll('#pills button')];
const rails = [...document.querySelectorAll('.rail button')];

const obs = new IntersectionObserver(entries => {
  entries.forEach(en => {
    if (!en.isIntersecting) return;
    const {pos, i} = en.target.dataset;
    const idx = DATA.findIndex(p => p.id === pos);
    pills.forEach((b, k) => b.classList.toggle('on', k === idx));
    rails.forEach(b => b.classList.toggle('on', b.dataset.go === `${pos}-${i}`));
  });
}, {rootMargin:'-40% 0px -55% 0px'});
document.querySelectorAll('.stream article').forEach(a => obs.observe(a));
</script>
</body>
</html>
