document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e }}\">\n        <div style=\"width:720px; max-width:88vw; background:#fff; border:2px solid var(--accent,#3D4ADE); border-radius:22px; box-shadow:0 30px 70px -34px rgba(20,20,32,.45); padding:38px 42px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:18px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:#6B6B73; max-width:420px; line-height:1.5;\">Soňa Manaková · Head of Customer Contract Management, Benelux<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:34px; color:var(--accent,#3D4ADE); flex:none; line-height:1;\">{{ timerStr }}<\u002Fdiv>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:27px; line-height:1.25; margin:0 0 22px; letter-spacing:-.015em;\">Six years across data, processes and people. I build strategy on how things actually work.<\u002Fh2>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:22px 32px; margin-bottom:22px;\">\n            <div>\n              <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:9px;\">signal<\u002Fdiv>\n              <ul style=\"margin:0; padding-left:18px; font-size:14.5px; line-height:1.55; color:#3a3a44;\">\n                <li style=\"margin-bottom:6px;\">I lead a team of 10, handling request-to-cash for international B2B accounts<\u002Fli>\n                <li style=\"margin-bottom:6px;\">Process, data and automation: Lean Six Sigma, Power BI, UiPath, AI<\u002Fli>\n                <li>Experience across APAC and Benelux<\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:9px;\">point at first<\u002Fdiv>\n              <ul style=\"margin:0; padding-left:18px; font-size:14.5px; line-height:1.55; color:#3a3a44;\">\n                <li style=\"margin-bottom:6px;\">AI summarization of order history, so no one reads 300 comments to understand one order<\u002Fli>\n                <li style=\"margin-bottom:6px;\">An early-warning system for orders likely to go wrong, before they escalate<\u002Fli>\n                <li>Repositioning my team towards being a strategic partner<\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ winked }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:14px; color:var(--decision,#C8862A); border-top:1px dashed #E0DED4; padding-top:16px; margin-bottom:18px;\">0:00. 30 seconds are up. You're still here.<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex; gap:12px;\">\n            <button onclick=\"{{ go.work }}\" style=\"display:inline-flex; align-items:center; gap:9px; padding:14px 24px; border-radius:999px; border:none; background:#1A1A20; color:#fff; font-family:'IBM Plex Sans'; font-size:15px; font-weight:500; cursor:pointer;\">I have more time <span style=\"font-family:'IBM Plex Mono';\">→<\u002Fspan><\u002Fbutton>\n            <button onclick=\"{{ go.contact }}\" style=\"display:inline-flex; align-items:center; gap:9px; padding:14px 24px; border-radius:999px; border:1.5px solid #1A1A20; background:#fff; color:#1A1A20; font-family:'IBM Plex Sans'; font-size:15px; font-weight:500; cursor:pointer;\">Contact me<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- ===== NODE: WORK (step, big) ===== -->\n    <div onclick=\"{{ go.work }}\" style=\"position:absolute; left:1300px; top:3080px; transform:translate(-50%,-50%); opacity:{{ v.work.op }}; pointer-events:{{ v.work.pe }}; z-index:{{ v.work.z }}; transition:opacity .6s ease; cursor:pointer;\">\n      <sc-if value=\"{{ v.work.idle }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:inline-flex; align-items:center; gap:11px; padding:16px 30px; border-radius:14px; border:1.5px solid #C9C7BD; background:#fff; box-shadow:0 3px 12px -6px rgba(0,0,0,.22); white-space:nowrap;\">\n          <span style=\"width:9px; height:9px; border-radius:50%; background:var(--accent,#3D4ADE);\"><\u002Fspan>\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:18px;\">Work<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ v.work.active }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"width:940px; max-width:92vw; max-height:80vh; overflow:auto; background:#fff; border:2px solid var(--accent,#3D4ADE); border-radius:22px; box-shadow:0 30px 70px -34px rgba(20,20,32,.45); padding:40px 44px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:6px;\">work · newest first<\u002Fdiv>\n          <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:32px; margin:0 0 30px; letter-spacing:-.02em;\">Three chapters: Strategy, Processes, Data.<\u002Fh2>\n\n          <!-- STRATEGY -->\n          <div style=\"margin-bottom:34px;\">\n            <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:6px;\">\n              <h3 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:23px; margin:0;\">Strategy<\u002Fh3>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; padding:5px 11px; border-radius:999px; background:var(--accent,#3D4ADE); color:#fff; letter-spacing:.04em;\">← I'm here now<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin:0 0 18px; font-size:15px; line-height:1.6; color:#6B6B73;\"><strong style=\"color:#1A1A20;\">Head of Customer Contract Management, Benelux<\u002Fstrong> — Orange Business, Netherlands. I lead a team of 10 across Benelux and own request-to-cash for international B2B accounts — the people, the governance, and the value we bring the customer.<\u002Fp>\n            <div style=\"display:grid; gap:10px;\">\n              <div style=\"border:1.5px solid #E6E4DA; border-radius:14px; overflow:hidden; background:#FCFBF8;\">\n                <button onclick=\"{{ tg.s1 }}\" style=\"all:unset; box-sizing:border-box; cursor:pointer; display:flex; gap:14px; align-items:flex-start; padding:17px 20px; width:100%;\">\n                  <span style=\"flex:none; width:22px; height:22px; display:grid; place-items:center; color:var(--accent,#3D4ADE); font-size:20px; transform:rotate({{ rot.s1 }}); transition:transform .25s ease;\">+<\u002Fspan>\n                  <span style=\"flex:1;\"><span style=\"display:block; font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">Repositioning CCM as a strategic partner<\u002Fspan><span style=\"display:block; color:#6B6B73; font-size:14.5px; margin-top:4px;\">A team buried in execution. How do you make it a strategic partner?<\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ oc.s1 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:2px 20px 20px 56px; display:grid; gap:13px;\">\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Business need<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">The team was buried in execution with no room for higher-value work, and CCM wasn't seen as a strategic partner.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Solution<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Built the narrative and a three-pillar model — people leadership, process governance, strategic contribution — broke it into concrete expectations and progress indicators, then took it to the team.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--decision,#C8862A); margin-bottom:4px;\">Results<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">A clear direction and practical steps: more autonomy, fixing root causes, dropping low-value work, more time on customer-facing strategic work.<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"border:1.5px solid #E6E4DA; border-radius:14px; overflow:hidden; background:#FCFBF8;\">\n                <button onclick=\"{{ tg.s2 }}\" style=\"all:unset; box-sizing:border-box; cursor:pointer; display:flex; gap:14px; align-items:flex-start; padding:17px 20px; width:100%;\">\n                  <span style=\"flex:none; width:22px; height:22px; display:grid; place-items:center; color:var(--accent,#3D4ADE); font-size:20px; transform:rotate({{ rot.s2 }}); transition:transform .25s ease;\">+<\u002Fspan>\n                  <span style=\"flex:1;\"><span style=\"display:block; font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">CCM and CCA operating model<\u002Fspan><span style=\"display:block; color:#6B6B73; font-size:14.5px; margin-top:4px;\">Two teams, blurred ownership, quiet friction. Name the real problem.<\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ oc.s2 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:2px 20px 20px 56px; display:grid; gap:13px;\">\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Business need<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Expectations between CCM and CCA were misaligned, there was friction, and ownership wasn't clear.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Solution<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Named the actual problems, prepared the content and format — a retro and workshops — aligned the right people, and turned it into actions: collaboration rules, ownership, escalation paths.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--decision,#C8862A); margin-bottom:4px;\">Results<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Clearer roles and expectations, and the start of an operating model that can scale without leaning on a few individuals.<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"border:1.5px solid #E6E4DA; border-radius:14px; overflow:hidden; background:#FCFBF8;\">\n                <button onclick=\"{{ tg.s3 }}\" style=\"all:unset; box-sizing:border-box; cursor:pointer; display:flex; gap:14px; align-items:flex-start; padding:17px 20px; width:100%;\">\n                  <span style=\"flex:none; width:22px; height:22px; display:grid; place-items:center; color:var(--accent,#3D4ADE); font-size:20px; transform:rotate({{ rot.s3 }}); transition:transform .25s ease;\">+<\u002Fspan>\n                  <span style=\"flex:1;\"><span style=\"display:block; font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">Outsourcing risk and impact analysis<\u002Fspan><span style=\"display:block; color:#6B6B73; font-size:14.5px; margin-top:4px;\">An outsourcing change that could quietly turn everything transactional.<\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ oc.s3 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:2px 20px 20px 56px; display:grid; gap:13px;\">\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Business need<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Preparing for a partnership and outsourcing change, with a real risk of sliding into a purely transactional model, dropping engagement, and ever more time spent writing detailed instructions.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Solution<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Worked through the risks and put forward mitigations — communication, building trust, clear requirements, documentation — tied to measurement and governance with metrics like first-time-right and recovered strategic time.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--decision,#C8862A); margin-bottom:4px;\">Results<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">A solid set of arguments and concrete steps for making the change work, for both leadership and the team.<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- PROCESSES -->\n          <div style=\"margin-bottom:34px;\">\n            <h3 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:23px; margin:0 0 6px;\">Processes<\u002Fh3>\n            <p style=\"margin:0 0 18px; font-size:15px; line-height:1.6; color:#6B6B73;\"><strong style=\"color:#1A1A20;\">Continuous Improvement Specialist<\u002Fstrong> — Orange Business (GDO), APAC. I hunted inefficiencies in service delivery and operations, ran the root-cause analysis, and designed solutions that brought process, data and automation together — Lean Six Sigma, Power BI, UiPath, AI — then made sure they were adopted.<\u002Fp>\n            <div style=\"display:grid; gap:10px;\">\n              <div style=\"border:1.5px solid #E6E4DA; border-radius:14px; overflow:hidden; background:#FCFBF8;\">\n                <button onclick=\"{{ tg.pr1 }}\" style=\"all:unset; box-sizing:border-box; cursor:pointer; display:flex; gap:14px; align-items:flex-start; padding:17px 20px; width:100%;\">\n                  <span style=\"flex:none; width:22px; height:22px; display:grid; place-items:center; color:var(--accent,#3D4ADE); font-size:20px; transform:rotate({{ rot.pr1 }}); transition:transform .25s ease;\">+<\u002Fspan>\n                  <span style=\"flex:1;\"><span style=\"display:block; font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">AI summarization of order history<\u002Fspan><span style=\"display:block; color:#6B6B73; font-size:14.5px; margin-top:4px;\">300 comments to understand one order. There's a faster way.<\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ oc.pr1 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:2px 20px 20px 56px; display:grid; gap:13px;\">\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Business need<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">PMs and decision-makers worked through long order histories and comment threads just to understand what was going on — slow, inconsistent, a regular source of escalations.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Solution<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Took it end to end — from use-case to solution design to an output people could actually use: a timeline, the latest changes, and root-cause analysis of any issue.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--decision,#C8862A); margin-bottom:4px;\">Results<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Faster answers, less digging, everyone working from the same picture.<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"border:1.5px solid #E6E4DA; border-radius:14px; overflow:hidden; background:#FCFBF8;\">\n                <button onclick=\"{{ tg.pr2 }}\" style=\"all:unset; box-sizing:border-box; cursor:pointer; display:flex; gap:14px; align-items:flex-start; padding:17px 20px; width:100%;\">\n                  <span style=\"flex:none; width:22px; height:22px; display:grid; place-items:center; color:var(--accent,#3D4ADE); font-size:20px; transform:rotate({{ rot.pr2 }}); transition:transform .25s ease;\">+<\u002Fspan>\n                  <span style=\"flex:1;\"><span style=\"display:block; font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">Early-warning mechanism for at-risk orders<\u002Fspan><span style=\"display:block; color:#6B6B73; font-size:14.5px; margin-top:4px;\">What if you could see an order go wrong before it does?<\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ oc.pr2 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:2px 20px 20px 56px; display:grid; gap:13px;\">\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Business need<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">The team reacted to escalations only once they'd happened — stressful and expensive to fix.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Solution<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Built risk-scoring logic for in-progress orders, a way to flag the risky ones, and a clear process for what to do when something went red.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--decision,#C8862A); margin-bottom:4px;\">Results<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Moved from firefighting towards prevention — the team can see risk coming and act earlier.<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"border:1.5px solid #E6E4DA; border-radius:14px; overflow:hidden; background:#FCFBF8;\">\n                <button onclick=\"{{ tg.pr3 }}\" style=\"all:unset; box-sizing:border-box; cursor:pointer; display:flex; gap:14px; align-items:flex-start; padding:17px 20px; width:100%;\">\n                  <span style=\"flex:none; width:22px; height:22px; display:grid; place-items:center; color:var(--accent,#3D4ADE); font-size:20px; transform:rotate({{ rot.pr3 }}); transition:transform .25s ease;\">+<\u002Fspan>\n                  <span style=\"flex:1;\"><span style=\"display:block; font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">Delivery team productivity (LDM)<\u002Fspan><span style=\"display:block; color:#6B6B73; font-size:14.5px; margin-top:4px;\">Productivity stuck below target. DMAIC, end to end.<\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ oc.pr3 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:2px 20px 20px 56px; display:grid; gap:13px;\">\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Business need<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Productivity wasn't reaching the global target or peer-region benchmark.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Solution<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Applied DMAIC — problem statement and goal, root-cause analysis, validated hypotheses, scenario projections, improvement suggestions, implementation and measurement.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--decision,#C8862A); margin-bottom:4px;\">Results<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Productivity target hit within six months.<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"border:1.5px solid #E6E4DA; border-radius:14px; overflow:hidden; background:#FCFBF8;\">\n                <button onclick=\"{{ tg.pr4 }}\" style=\"all:unset; box-sizing:border-box; cursor:pointer; display:flex; gap:14px; align-items:flex-start; padding:17px 20px; width:100%;\">\n                  <span style=\"flex:none; width:22px; height:22px; display:grid; place-items:center; color:var(--accent,#3D4ADE); font-size:20px; transform:rotate({{ rot.pr4 }}); transition:transform .25s ease;\">+<\u002Fspan>\n                  <span style=\"flex:1;\"><span style=\"display:block; font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">Quality parameters instead of random audits<\u002Fspan><span style=\"display:block; color:#6B6B73; font-size:14.5px; margin-top:4px;\">Random audits caught little. Replace luck with parameters.<\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ oc.pr4 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:2px 20px 20px 56px; display:grid; gap:13px;\">\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Business need<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Incorrect orders caused delivery delays, delayed revenue and customer dissatisfaction.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Solution<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Set up qualitative parameters and proper monitoring, with analysis of what was causing the issues.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--decision,#C8862A); margin-bottom:4px;\">Results<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Targeted improvement actions addressing the main drivers of errors.<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"border:1.5px solid #E6E4DA; border-radius:14px; overflow:hidden; background:#FCFBF8;\">\n                <button onclick=\"{{ tg.pr5 }}\" style=\"all:unset; box-sizing:border-box; cursor:pointer; display:flex; gap:14px; align-items:flex-start; padding:17px 20px; width:100%;\">\n                  <span style=\"flex:none; width:22px; height:22px; display:grid; place-items:center; color:var(--accent,#3D4ADE); font-size:20px; transform:rotate({{ rot.pr5 }}); transition:transform .25s ease;\">+<\u002Fspan>\n                  <span style=\"flex:1;\"><span style=\"display:block; font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">Automated network-availability monitoring<\u002Fspan><span style=\"display:block; color:#6B6B73; font-size:14.5px; margin-top:4px;\">Outages noticed too late. Put the watching on autopilot.<\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ oc.pr5 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:2px 20px 20px 56px; display:grid; gap:13px;\">\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Business need<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Outages and availability drops were caught late, hitting supplier quality and the customer.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Solution<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Set up automated daily monitoring of device performance, with reporting that surfaces the most serious issues and links them to operational steps.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--decision,#C8862A); margin-bottom:4px;\">Results<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Higher supplier quality and customer satisfaction.<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"border:1.5px solid #E6E4DA; border-radius:14px; overflow:hidden; background:#FCFBF8;\">\n                <button onclick=\"{{ tg.pr6 }}\" style=\"all:unset; box-sizing:border-box; cursor:pointer; display:flex; gap:14px; align-items:flex-start; padding:17px 20px; width:100%;\">\n                  <span style=\"flex:none; width:22px; height:22px; display:grid; place-items:center; color:var(--accent,#3D4ADE); font-size:20px; transform:rotate({{ rot.pr6 }}); transition:transform .25s ease;\">+<\u002Fspan>\n                  <span style=\"flex:1;\"><span style=\"display:block; font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">Team upskilling strategy<\u002Fspan><span style=\"display:block; color:#6B6B73; font-size:14.5px; margin-top:4px;\">Training that finally matches what the team actually delivers.<\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ oc.pr6 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:2px 20px 20px 56px; display:grid; gap:13px;\">\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Business need<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Training plans weren't aligned with what the team delivered or where the company was going.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Solution<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Mapped where people actually were, set out an upskilling strategy, and connected training to the services we delivered and what was coming next.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--decision,#C8862A); margin-bottom:4px;\">Results<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">A clearer direction for developing people, and a team better prepared to deliver.<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- DATA -->\n          <div>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:23px; margin:0 0 6px;\">Data<\u002Fh3>\n            <p style=\"margin:0 0 18px; font-size:15px; line-height:1.6; color:#6B6B73;\"><strong style=\"color:#1A1A20;\">Digital Web &amp; Media Analyst<\u002Fstrong> — Orange, Slovakia. I analysed digital customer journeys and built dashboards and analytics frameworks that turned data into decisions people could act on.<\u002Fp>\n            <div style=\"display:grid; gap:10px;\">\n              <div style=\"border:1.5px solid #E6E4DA; border-radius:14px; overflow:hidden; background:#FCFBF8;\">\n                <button onclick=\"{{ tg.d1 }}\" style=\"all:unset; box-sizing:border-box; cursor:pointer; display:flex; gap:14px; align-items:flex-start; padding:17px 20px; width:100%;\">\n                  <span style=\"flex:none; width:22px; height:22px; display:grid; place-items:center; color:var(--accent,#3D4ADE); font-size:20px; transform:rotate({{ rot.d1 }}); transition:transform .25s ease;\">+<\u002Fspan>\n                  <span style=\"flex:1;\"><span style=\"display:block; font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">Metrics hub<\u002Fspan><span style=\"display:block; color:#6B6B73; font-size:14.5px; margin-top:4px;\">People avoided the dashboards — they didn't trust the numbers.<\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ oc.d1 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:2px 20px 20px 56px; display:grid; gap:13px;\">\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Business need<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Metrics were used across dashboards but defined inconsistently. People avoided the dashboards because they didn't know how the numbers were calculated — no trust, no consistent interpretation.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Solution<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Built central metrics documentation that unified definitions across dashboards.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--decision,#C8862A); margin-bottom:4px;\">Results<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">A more data-driven culture and reliable data — analysts could reuse definitions instead of redefining each time, and trust in reporting improved.<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"border:1.5px solid #E6E4DA; border-radius:14px; overflow:hidden; background:#FCFBF8;\">\n                <button onclick=\"{{ tg.d2 }}\" style=\"all:unset; box-sizing:border-box; cursor:pointer; display:flex; gap:14px; align-items:flex-start; padding:17px 20px; width:100%;\">\n                  <span style=\"flex:none; width:22px; height:22px; display:grid; place-items:center; color:var(--accent,#3D4ADE); font-size:20px; transform:rotate({{ rot.d2 }}); transition:transform .25s ease;\">+<\u002Fspan>\n                  <span style=\"flex:1;\"><span style=\"display:block; font-family:'Space Grotesk'; font-weight:600; font-size:17px;\">Digital customer journey<\u002Fspan><span style=\"display:block; color:#6B6B73; font-size:14.5px; margin-top:4px;\">Where exactly do people drop off? Find the leak, test the fix.<\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ oc.d2 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:2px 20px 20px 56px; display:grid; gap:13px;\">\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Business need<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Increase digital conversions.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:4px;\">Solution<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Built customer-journey funnels to find conversion ratios between steps and the biggest drop-off points. Used the data to test things, not to win arguments.<\u002Fp><\u002Fdiv>\n                    <div><div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#9a988e; margin-bottom:4px;\">Results<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#9a988e; font-style:italic;\">In progress — not captured yet.<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:28px; display:flex; justify-content:flex-end;\">\n              <button onclick=\"{{ go.fork2 }}\" style=\"display:inline-flex; align-items:center; gap:9px; padding:14px 26px; border-radius:999px; border:none; background:#1A1A20; color:#fff; font-family:'IBM Plex Sans'; font-size:15px; font-weight:500; cursor:pointer;\">Where to next <span style=\"font-family:'IBM Plex Mono';\">→<\u002Fspan><\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- ===== NODE: FORK 2 (decision) ===== -->\n    <div onclick=\"{{ go.fork2 }}\" style=\"position:absolute; left:1300px; top:3960px; transform:translate(-50%,-50%); opacity:{{ v.fork2.op }}; pointer-events:{{ v.fork2.pe }}; z-index:{{ v.fork2.z }}; transition:opacity .6s ease; cursor:pointer;\">\n      <sc-if value=\"{{ v.fork2.idle }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"width:130px; height:130px; display:grid; place-items:center; position:relative;\">\n          <div style=\"position:absolute; width:92px; height:92px; background:#fff; border:1.5px solid var(--decision,#C8862A); transform:rotate(45deg); border-radius:9px; box-shadow:0 3px 12px -6px rgba(0,0,0,.22);\"><\u002Fdiv>\n          <span style=\"position:relative; font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--decision,#C8862A);\">path?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ v.fork2.active }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:24px;\">\n          <div style=\"width: -->\n    <div onclick=\"{{ go.know }}\" style=\"position:absolute; left:430px; top:4820px; transform:translate(-50%,-50%); opacity:{{ v.know.op }}; pointer-events:{{ v.know.pe }}; z-index:{{ v.know.z }}; transition:opacity .6s ease; cursor:pointer;\">\n      <sc-if value=\"{{ v.know.idle }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:inline-flex; align-items:center; gap:11px; padding:15px 26px; border-radius:14px; border:1.5px solid #C9C7BD; background:#fff; box-shadow:0 3px 12px -6px rgba(0,0,0,.22); white-space:nowrap;\">\n          <span style=\"width:8px; height:8px; border-radius:50%; background:var(--accent,#3D4ADE);\"><\u002Fspan>\n          <span style=\"font-weight:500; font-size:17px;\">Get to know me<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ v.know.active }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"width:640px; max-width:88vw; background:#fff; border:2px solid var(--accent,#3D4ADE); border-radius:22px; box-shadow:0 30px 70px -34px rgba(20,20,32,.45); padding:38px 42px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:14px;\">get_to_know_me<\u002Fdiv>\n          <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:28px; margin:0 0 26px; letter-spacing:-.015em;\">A bit more, off the main path.<\u002Fh2>\n          <div style=\"margin-bottom:24px;\">\n            <h3 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:19px; margin:0 0 8px;\">Freelancing<\u002Fh3>\n            <p style=\"margin:0; font-size:15px; line-height:1.6; color:#9a988e; font-style:italic; border-left:2px dashed #D8D6CC; padding-left:14px;\">Copy still to come — a line on the freelancing period and a couple of project examples.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:30px;\">\n            <h3 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:19px; margin:0 0 10px;\">Outside work<\u002Fh3>\n            <ul style=\"margin:0; padding-left:18px; font-size:15px; line-height:1.6; color:#3a3a44;\">\n              <li style=\"margin-bottom:7px;\"><strong style=\"color:#1A1A20;\">Freetree Society<\u002Fstrong> — I volunteer planting trees and helping with reforestation.<\u002Fli>\n              <li><strong style=\"color:#1A1A20;\">Arduino projects<\u002Fstrong> — I build small Arduino projects in my spare time.<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <button onclick=\"{{ go.contact }}\" style=\"display:inline-flex; align-items:center; gap:9px; padding:14px 26px; border-radius:999px; border:none; background:#1A1A20; color:#fff; font-family:'IBM Plex Sans'; font-size:15px; font-weight:500; cursor:pointer;\">Let's talk <span style=\"font-family:'IBM Plex Mono';\">→<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- ===== NODE: FAQ (step) ===== -->\n    <div onclick=\"{{ go.faq }}\" style=\"position:absolute; left:2170px; top:4820px; transform:translate(-50%,-50%); opacity:{{ v.faq.op }}; pointer-events:{{ v.faq.pe }}; z-index:{{ v.faq.z }}; transition:opacity .6s ease; cursor:pointer;\">\n      <sc-if value=\"{{ v.faq.idle }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:inline-flex; align-items:center; gap:11px; padding:15px 26px; border-radius:14px; border:1.5px solid #C9C7BD; background:#fff; box-shadow:0 3px 12px -6px rgba(0,0,0,.22); white-space:nowrap;\">\n          <span style=\"width:8px; height:8px; border-radius:50%; background:var(--accent,#3D4ADE);\"><\u002Fspan>\n          <span style=\"font-weight:500; font-size:17px;\">FAQ<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ v.faq.active }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"width:620px; max-width:88vw; background:#fff; border:2px solid var(--accent,#3D4ADE); border-radius:22px; box-shadow:0 30px 70px -34px rgba(20,20,32,.45); padding:38px 42px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent,#3D4ADE); margin-bottom:14px;\">faq · a chain of whys<\u002Fdiv>\n          <div style=\"display:grid; gap:16px; margin-bottom:30px;\">\n            <div style=\"border-left:2px solid var(--accent,#3D4ADE); padding-left:16px;\"><div style=\"font-family:'Space Grotesk'; font-weight:600; font-size:16px; margin-bottom:3px;\">Why should we talk?<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Because I make operations run better, and I make the improvement actually stick.<\u002Fp><\u002Fdiv>\n            <div style=\"border-left:2px solid var(--accent,#3D4ADE); padding-left:16px;\"><div style=\"font-family:'Space Grotesk'; font-weight:600; font-size:16px; margin-bottom:3px;\">Why can I do that?<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Because I've done it at three levels: in the data, in the processes, and leading the people.<\u002Fp><\u002Fdiv>\n            <div style=\"border-left:2px solid var(--accent,#3D4ADE); padding-left:16px;\"><div style=\"font-family:'Space Grotesk'; font-weight:600; font-size:16px; margin-bottom:3px;\">Why does the combination work?<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Because each level taught me to look at the same problem from a different height.<\u002Fp><\u002Fdiv>\n            <div style=\"border-left:2px solid var(--accent,#3D4ADE); padding-left:16px;\"><div style=\"font-family:'Space Grotesk'; font-weight:600; font-size:16px; margin-bottom:3px;\">Why does it matter?<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Because the strategy I trust is the kind built from the ground up, on how things actually run.<\u002Fp><\u002Fdiv>\n            <div style=\"border-left:2px solid var(--decision,#C8862A); padding-left:16px;\"><div style=\"font-family:'Space Grotesk'; font-weight:600; font-size:16px; margin-bottom:3px;\">So why do I do it?<\u002Fdiv><p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#3a3a44;\">Because I like owning something end to end and seeing it actually work.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ go.contact }}\" style=\"display:inline-flex; align-items:center; gap:9px; padding:14px 26px; border-radius:999px; border:none; background:#1A1A20; color:#fff; font-family:'IBM Plex Sans'; font-size:15px; font-weight:500; cursor:pointer;\">Let's talk <span style=\"font-family:'IBM Plex Mono';\">→<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- ===== NODE: CONTACT (end) ===== -->\n    <div onclick=\"{{ go.contact }}\" style=\"position:absolute; left:1300px; top:5760px; transform:translate(-50%,-50%); opacity:{{ v.contact.op }}; pointer-events:{{ v.contact.pe }}; z-index:{{ v.contact.z }}; transition:opacity .6s ease; cursor:pointer;\">\n      <sc-if value=\"{{ v.contact.idle }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:inline-flex; align-items:center; gap:11px; padding:16px 30px; border-radius:999px; border:2px solid #1A1A20; background:#fff; box-shadow:0 4px 16px -8px rgba(0,0,0,.28); white-space:nowrap;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#3D4ADE);\">◉<\u002Fspan>\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:17px;\">Contact<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ v.contact.active }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"width:600px; max-width:88vw; background:#1A1A20; color:#fff; border:2px solid var(--accent,#3D4ADE); border-radius:38px; box-shadow:0 30px 70px -30px rgba(20,20,32,.6); padding:44px 46px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#9aa0ff; margin-bottom:20px;\">process.end()<\u002Fdiv>\n          <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:40px; margin:0 0 18px; letter-spacing:-.02em;\">Let's talk.<\u002Fh2>\n          <p style=\"margin:0 0 26px; font-size:17px; line-height:1.6; color:#cfceda;\">If you've read this far, we probably see things in a similar way. I'm at my best when I get to own something properly — the whole way from the data to the process to the people involved.<\u002Fp>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9aa0ff; margin-bottom:10px;\">roles I'm open to<\u002Fdiv>\n          <ul style=\"margin:0 0 8px; padding-left:18px; font-size:15px; line-height:1.6; color:#e7e6ee;\">\n            <li>Continuous Improvement / Operational Excellence<\u002Fli>\n            <li>Customer &amp; Service Operations<\u002Fli>\n            <li>Process &amp; Transformation<\u002Fli>\n            <li>Strategy &amp; Operations<\u002Fli>\n          <\u002Ful>\n          <p style=\"margin:0 0 28px; font-size:13px; color:#8b8a98; font-style:italic;\">Consider these a direction rather than a fixed list.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:12px;\">\n            <button onclick=\"{{ emailClick }}\" style=\"display:inline-flex; align-items:center; gap:9px; padding:14px 24px; border-radius:999px; background:#fff; color:#1A1A20; border:none; font-family:'IBM Plex Sans'; font-size:15px; font-weight:500; cursor:pointer;\">{{ emailText }}<\u002Fbutton>\n            <a href=\"https://linkedin.com/in/sona-manakova\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:9px; padding:14px 24px; border-radius:999px; border:1.5px solid #4a4a55; background:transparent; color:#fff; text-decoration:none; font-family:'IBM Plex Sans'; font-size:15px; font-weight:500;\">linkedin.com/in/sona-manakova<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ===================== OVERLAY UI ===================== -->\n  <!-- breadcrumb + back -->\n  <div style=\"position:fixed; top:22px; left:24px; z-index:200; display:flex; flex-direction:column; gap:12px; align-items:flex-start;\">\n    <div style=\"display:flex; gap:6px; flex-wrap:wrap; align-items:center; font-family:'IBM Plex Mono',monospace; font-size:12.5px; max-width:60vw; background:rgba(244,243,238,.82); backdrop-filter:blur(6px); padding:7px 12px; border-radius:9px; border:1px solid #E0DED4;\">\n      <sc-for list=\"{{ crumb }}\" as=\"c\" hint-placeholder-count=\"1\">\n        <span style=\"display:inline-flex; gap:6px; align-items:center;\"><span style=\"color:#cdcbc1;\">{{ c.sep }}<\u002Fspan><span style=\"{{ c.txtStyle }}\">{{ c.label }}<\u002Fspan><\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <button onclick=\"{{ backToStart }}\" style=\"display:inline-flex; align-items:center; gap:7px; padding:9px 16px; border-radius:999px; border:1px solid #D8D6CC; background:rgba(255,255,255,.85); backdrop-filter:blur(6px); color:#6B6B73; font-family:'IBM Plex Mono',monospace; font-size:12.5px; cursor:pointer;\">← back to start<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- view map toggle -->\n  <button onclick=\"{{ toggleOverview }}\" style=\"position:fixed; top:22px; right:24px; z-index:200; display:inline-flex; align-items:center; gap:8px; padding:11px 20px; border-radius:999px; border:1.5px solid #1A1A20; background:rgba(255,255,255,.9); backdrop-filter:blur(6px); color:#1A1A20; font-family:'IBM Plex Sans'; font-size:14px; font-weight:500; cursor:pointer;\">{{ overviewLabel }}<\u002Fbutton>\n\n  <!-- footer -->\n  <div style=\"position:fixed; left:24px; bottom:18px; z-index:200; display:flex; align-items:center; gap:10px;\">\n    <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; color:#1A1A20; font-size:15px;\">Soňa Manaková<\u002Fspan>\n    <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9a988e;\">portfolio · process map<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- hint -->\n  <div style=\"position:fixed; right:24px; bottom:18px; z-index:200; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#9a988e;\">click any node to jump<\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#3D4ADE&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;decision&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#C8862A&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;paper&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#F4F3EE&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    current: 'landing',\n    visited: ['landing'],\n    overview: false,\n    vw: (typeof window !== 'undefined' ? window.innerWidth : 1280),\n    vh: (typeof window !== 'undefined' ? window.innerHeight : 800),\n    timer: 30,\n    timing: false,\n    openCards: [],\n    ready: false,\n  };\n\n  nodes = {\n    landing: { x: 1300, y: 360,  depth: 0 },\n    about:   { x: 1300, y: 1240, depth: 1 },\n    fork1:   { x: 1300, y: 2080, depth: 2 },\n    speed:   { x: 2360, y: 2080, depth: 3 },\n    work:    { x: 1300, y: 3080, depth: 4 },\n    fork2:   { x: 1300, y: 3960, depth: 5 },\n    know:    { x: 430,  y: 4820, depth: 6 },\n    faq:     { x: 2170, y: 4820, depth: 6 },\n    contact: { x: 1300, y: 5760, depth: 7 },\n  };\n\n  edges = [\n    ['landing','about'], ['about','fork1'],\n    ['fork1','work'], ['fork1','speed'],\n    ['speed','work'], ['speed','contact'],\n    ['work','fork2'],\n    ['fork2','contact'], ['fork2','know'], ['fork2','faq'],\n    ['know','contact'], ['faq','contact'],\n  ];\n\n  componentDidMount() {\n    this._r = () => this.setState({ vw: window.innerWidth, vh: window.innerHeight });\n    window.addEventListener('resize', this._r);\n    setTimeout(() => this.setState({ ready: true }), 90);\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._r);\n    clearInterval(this._t);\n  }\n\n  frontier() {\n    const v = new Set(this.state.visited);\n    const f = new Set();\n    this.edges.forEach(([from, to]) => { if (v.has(from) && !v.has(to)) f.add(to); });\n    return f;\n  }\n\n  navigate(id) {\n    // swallow the second call fired in the same click (inner CTA -> wrapper bubble)\n    const now = Date.now();\n    if (now - (this._lastNav || 0) < 80) return;\n    this._lastNav = now;\n    const v = new Set(this.state.visited);\n    const reachable = v.has(id) || this.frontier().has(id);\n    if (!reachable) return;\n    const visited = v.has(id) ? this.state.visited : [...this.state.visited, id];\n    this.setState({ current: id, visited, overview: false });\n    clearInterval(this._t);\n    if (id === 'speed') {\n      this.setState({ timer: 30, timing: true });\n      this._t = setInterval(() => {\n        this.setState(s => {\n          if (s.timer <= 1) { clearInterval(this._t); return { timer: 0, timing: false }; }\n          return { timer: s.timer - 1 };\n        });\n      }, 1000);\n    }\n  }\n\n  toggleCard(id) {\n    this.setState(s => {\n      const set = new Set(s.openCards);\n      set.has(id) ? set.delete(id) : set.add(id);\n      return { openCards: [...set] };\n    });\n  }\n\n  camera() {\n    const { vw, vh, overview, current, ready } = this.state;\n    if (overview) {\n      const ids = [...new Set([...this.state.visited, ...this.frontier()])];\n      const xs = ids.map(i => this.nodes[i].x);\n      const ys = ids.map(i => this.nodes[i].y);\n      const pad = 320;\n      const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;\n      const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;\n      const bw = maxX - minX, bh = maxY - minY;\n      const s = Math.min(vw / bw, vh / bh);\n      const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;\n      return { tx: vw / 2 - cx * s, ty: vh / 2 - cy * s, s };\n    }\n    const n = this.nodes[current];\n    let s = 1.0 - 0.026 * n.depth;\n    s = Math.max(0.82, Math.min(1.0, s));\n    if (!ready) s *= 1.16; // intro: start more zoomed-in, then ease out\n    return { tx: vw / 2 - n.x * s, ty: vh / 2 - n.y * s, s };\n  }\n\n  renderVals() {\n    const accent = this.props.accent || '#3D4ADE';\n    const decision = this.props.decision || '#C8862A';\n    const paper = this.props.paper || '#F4F3EE';\n\n    const { current, overview } = this.state;\n    const visited = new Set(this.state.visited);\n    const front = this.frontier();\n    const cam = this.camera();\n    const mapTransform = `translate(${cam.tx}px, ${cam.ty}px) scale(${cam.s})`;\n\n    const v = {};\n    Object.keys(this.nodes).forEach(id => {\n      const isCur = current === id && !overview;\n      const st = visited.has(id) ? 'visited' : (front.has(id) ? 'frontier' : 'hidden');\n      const reach = st !== 'hidden';\n      v[id] = {\n        active: isCur,\n        idle: !isCur,\n        op: st === 'hidden' ? 0 : (st === 'frontier' ? 0.42 : 1),\n        pe: reach ? 'auto' : 'none',\n        z: isCur ? 60 : (st === 'frontier' ? 6 : 12),\n      };\n    });\n\n    const eo = (from, to) => visited.has(from) ? (visited.has(to) ? 1 : 0.4) : 0;\n    const eh = {\n      la: eo('landing','about'), af: eo('about','fork1'),\n      fw: eo('fork1','work'), fs: eo('fork1','speed'),\n      sw: eo('speed','work'), sc: eo('speed','contact'),\n      wf: eo('work','fork2'), f2c: eo('fork2','contact'),\n      f2k: eo('fork2','know'), f2q: eo('fork2','faq'),\n      kc: eo('know','contact'), qc: eo('faq','contact'),\n    };\n\n    const go = {};\n    Object.keys(this.nodes).forEach(id => {\n      go[id] = (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.navigate(id); };\n    });\n\n    const cardIds = ['s1','s2','s3','pr1','pr2','pr3','pr4','pr5','pr6','d1','d2'];\n    const open = new Set(this.state.openCards);\n    const oc = {}, tg = {}, rot = {};\n    cardIds.forEach(id => {\n      oc[id] = open.has(id);\n      tg[id] = (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.toggleCard(id); };\n      rot[id] = open.has(id) ? '45deg' : '0deg';\n    });\n\n    const codes = { landing: 'init', about: 'about', fork1: 'path?', speed: '30s', work: 'work', fork2: 'path?', know: 'me', faq: 'faq', contact: 'contact' };\n    const crumb = this.state.visited.map((id, i) => ({\n      label: codes[id],\n      sep: i === 0 ? '' : '/',\n      txtStyle: id === current && !overview ? 'color:#1A1A20;font-weight:600;' : 'color:#9a988e;font-weight:400;',\n    }));\n\n    const t = this.state.timer;\n    const timerStr = '0:' + (t < 10 ? '0' + t : t);\n    const winked = !this.state.timing && this.state.timer === 0;\n\n    const mu = 'sona.manakova', md = 'gmail.com';\n    const emailText = mu + '@' + md;\n    const emailClick = () => { window.location.href = 'mailto:' + mu + '@' + md; };\n\n    return {\n      emailText, emailClick,\n      accent, decision, paper,\n      mapTransform, v, eh, go, oc, tg, rot, crumb, timerStr, winked,\n      overview,\n      overviewLabel: overview ? 'Exit map view' : 'View whole map',\n      toggleOverview: () => this.setState(s => ({ overview: !s.overview })),\n      backToStart: () => this.navigate('landing'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
