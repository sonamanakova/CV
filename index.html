<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sona Manakova · Process Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#F4F3EE;}
  a{color:#3D4ADE;text-decoration:none;}
  a:hover{color:#2732b8;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#cdcbc1;border-radius:6px;}
  @keyframes cardIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
  @keyframes ringPulse{0%{transform:scale(1);opacity:.65;}100%{transform:scale(2.6);opacity:0;}}
  @keyframes revealFade{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

  #stage{position:fixed;inset:0;overflow:hidden;background:#F4F3EE;font-family:'IBM Plex Sans',sans-serif;color:#17171C;--accent:#3D4ADE;--decision:#C8862A;--bar-h:60px;}
  #topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:clamp(10px,2.4vw,18px);padding:12px clamp(14px,4vw,26px);background:linear-gradient(#F4F3EE 55%,rgba(244,243,238,.82));backdrop-filter:blur(9px);border-bottom:1px solid rgba(0,0,0,.05);}
  #scroll-el{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;background-image:radial-gradient(#dedccf 1.3px,transparent 1.3px);background-size:44px 44px;}
  #flow-wrap{position:relative;max-width:820px;width:100%;margin:0 auto;padding:clamp(96px,13vh,124px) clamp(15px,4vw,26px) clamp(120px,20vh,200px);}

  button{font:inherit;}
  .btn-dark{display:inline-flex;align-items:center;gap:9px;padding:14px 26px;border-radius:999px;border:none;background:#17171C;color:#fff;font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;}
  .btn-dark:hover{background:#000;}
  .btn-outline{display:inline-flex;align-items:center;gap:9px;padding:14px 26px;border-radius:999px;border:1.5px solid #17171C;background:#fff;color:#17171C;font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;}
  .btn-outline:hover{background:#17171C;color:#fff;}
  .linkedin-link{display:inline-flex;align-items:center;gap:9px;padding:14px 24px;border-radius:999px;border:1.5px solid #4a4a55;background:transparent;color:#fff;text-decoration:none;font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:500;}
  .linkedin-link:hover{border-color:#fff;color:#fff;}
  .email-btn{display:inline-flex;align-items:center;gap:9px;padding:14px 24px;border-radius:999px;background:#fff;color:#17171C;border:none;font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;}

  /* ---- work section ---- */
  .pos-row{display:grid;grid-template-columns:32px 1fr auto;gap:16px;align-items:baseline;padding:18px 0;border-bottom:1px solid #E4E2D8;text-align:left;width:100%;background:none;border-left:0;border-right:0;border-top:0;cursor:pointer;color:#17171C;font:inherit;transition:background .18s,padding .18s;}
  .pos-row:hover{background:#fbfbf8;padding-left:10px;padding-right:10px;}
  .pos-row .n{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);}
  .pos-row .t{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(16px,2.2vw,19px);letter-spacing:-.01em;}
  .pos-row .sub{display:block;font-family:'IBM Plex Sans',sans-serif;font-weight:400;font-size:13px;color:#6B6B73;margin-top:4px;}
  .pos-row .y{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#9a988e;white-space:nowrap;}
  .pos-badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--decision);border:1px solid #ecd9bd;background:#fffdf7;border-radius:99px;padding:2px 7px;margin-left:8px;vertical-align:middle;}

  .pos-pillbar{position:fixed;top:var(--bar-h);left:0;right:0;max-width:820px;margin:0 auto;z-index:150;background:rgba(244,243,238,.96);backdrop-filter:blur(9px);border:1px solid #E4E2D8;border-top:0;border-radius:0 0 16px 16px;padding:10px clamp(15px,4vw,26px);display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .22s ease,transform .22s ease;}
  .pos-pillbar.on{opacity:1;transform:none;pointer-events:auto;}
  .pos-pillbar::-webkit-scrollbar{display:none;}
  .pos-pill{flex:0 0 auto;background:#fff;border:1px solid #E4E2D8;border-radius:999px;padding:7px 14px;cursor:pointer;color:#6B6B73;white-space:nowrap;font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.03em;transition:.18s;}
  .pos-pill:hover{border-color:#17171C;color:#17171C;}
  .pos-pill.on{background:#17171C;border-color:#17171C;color:#fff;}

  .pos-opener{position:relative;background:#17171C;color:#fff;padding:14vh clamp(15px,4vw,26px) 9vh;min-height:64vh;display:flex;flex-direction:column;justify-content:center;scroll-margin-top:var(--bar-h);}
  .pos-opener .inner{max-width:820px;margin:0 auto;width:100%;}
  .pos-opener .n{display:block;font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#9aa0ff;margin-bottom:20px;}
  .pos-opener .grad{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#9aa0ff;border:1px solid #363a55;border-radius:99px;padding:3px 9px;margin-bottom:16px;}
  .pos-opener h2{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(30px,6vw,52px);line-height:1.06;letter-spacing:-.02em;margin:0 0 14px;max-width:16ch;}
  .pos-opener .meta{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#9aa0ff;margin:0 0 22px;}
  .pos-opener .desc{max-width:52ch;font-size:clamp(15px,2.2vw,17px);line-height:1.6;color:#cfceda;margin:0 0 34px;}
  .pos-opener .down{display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#9aa0ff;}

  .pos-work{display:grid;grid-template-columns:190px 1fr;gap:clamp(18px,3vw,32px);padding:9vh clamp(15px,4vw,26px);}
  .pos-rail{position:sticky;top:calc(var(--bar-h) + 56px);align-self:start;}
  .pos-rail ol{list-style:none;margin:0;padding:0;}
  .pos-rail li{margin-bottom:2px;}
  .pos-rail button{width:100%;text-align:left;background:none;border:0;cursor:pointer;display:grid;grid-template-columns:24px 1fr;gap:10px;padding:11px 12px;border-left:2px solid transparent;color:#9a988e;font-family:inherit;font-size:14px;line-height:1.4;transition:.2s;}
  .pos-rail button .n{font-family:'IBM Plex Mono',monospace;font-size:11px;padding-top:2px;}
  .pos-rail button:hover{color:#3a3a44;}
  .pos-rail button.on{color:#17171C;border-left-color:var(--accent);background:#fbfbf8;}
  .pos-rail button.on .n{color:var(--accent);}

  .pos-stream article{min-height:58vh;padding-bottom:9vh;scroll-margin-top:calc(var(--bar-h) + 66px);}
  .pos-stream .tag{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#a9a79c;margin-bottom:10px;}
  .pos-stream h3{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(21px,3.2vw,28px);line-height:1.16;letter-spacing:-.02em;margin:0 0 18px;max-width:22ch;}
  .pos-stream p.problem{max-width:60ch;margin:0 0 20px;font-size:14.5px;line-height:1.62;color:#6B6B73;}
  .pos-stream .result{border-left:2px solid var(--decision);padding:2px 0 2px 20px;margin:0 0 22px;max-width:56ch;font-style:italic;font-size:clamp(15px,2.2vw,17.5px);line-height:1.5;color:#17171C;}
  .pos-stream .tools{display:flex;flex-wrap:wrap;gap:7px;}
  .pos-stream .tools span{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#6B6B73;border:1px solid #E4E2D8;background:#fff;border-radius:99px;padding:5px 10px;}

  @media (max-width:900px){
    .pos-work{grid-template-columns:1fr;}
    .pos-rail{position:static;padding-bottom:10px;border-bottom:1px solid #E4E2D8;margin-bottom:10px;}
  }
</style>
</head>
<body>
<div id="stage">
  <div id="topbar">
    <div style="display:flex;flex-direction:column;line-height:1.1;flex:none;">
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(14px,3.4vw,16px);letter-spacing:-.01em;">Sona Manakova</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9a988e;letter-spacing:.03em;">portfolio · process map</span>
    </div>
    <div style="flex:1;"></div>
  </div>

  <div id="scroll-el">
    <div id="flow-wrap"><div id="flow-inner"></div></div>
  </div>

  <div id="minimap-dock"></div>
</div>

<script>
(function(){
  'use strict';

  var EMAIL = 'sona.manakova@gmail.com';

  var nodes = {
    landing:{x:1300,y:360,type:'term'}, about:{x:1300,y:1240,type:'process'},
    fork1:{x:1300,y:2080,type:'decision'}, speed:{x:2360,y:2080,type:'process'},
    work:{x:1300,y:3080,type:'process'}, fork2:{x:1300,y:3960,type:'decision'},
    know:{x:430,y:4820,type:'process'}, faq:{x:2170,y:4820,type:'process'}, contact:{x:1300,y:5760,type:'term'}
  };
  var order = ['landing','about','fork1','speed','work','fork2','know','faq','contact'];
  var edges = [['landing','about'],['about','fork1'],['fork1','work'],['fork1','speed'],['speed','work'],['speed','contact'],['work','fork2'],['fork2','contact'],['fork2','know'],['fork2','faq'],['know','contact'],['faq','contact']];
  var edgeLabels = {'fork1>work':'explore','fork1>speed':'in a hurry','fork2>contact':'talk','fork2>know':'more','fork2>faq':'why?'};
  var labels = {landing:'Start',about:'About',fork1:'Choose',speed:'30-sec',work:'Work',fork2:'Choose',know:'About me',faq:'FAQ',contact:'Contact'};
  var bounds = {minX:430,maxX:2360,minY:360,maxY:5760};

  var kpis = [
    { idx:'01', num:'6', label:'years · data → process → people', color:'var(--accent)' },
    { idx:'02', num:'3', label:'countries · SK → MY → NL', color:'var(--accent)' },
    { idx:'03', num:'20+', label:'projects shipped', color:'var(--accent)' },
    { idx:'04', num:'0', label:'<em>"we\'ve always done it this way"</em> survived', color:'var(--decision)' }
  ];

  var roles = [
    { num:'01', rotation:true, company:'Orange Business', country:'Netherlands', years:'2025 – now',
      title:'Head of Customer Contract Management, Benelux',
      oneLine:'I lead a team of 10 running sales operations for international B2B accounts.',
      projects:[
        { title:'Team strategy', problem:'The team was consumed by order intake, quoting instructions and firefighting, with little room for the work that actually creates value.', result:'Set a clear goal to strengthen strategic impact based on three things: enabling supporting teams to work autonomously, owning the health of the process and being a genuine strategic partner to the account team and the customer. Impact: Energy shifted from busy execution to work that creates real value.', tools:['Strategy','Facilitation','Coaching'] },
        { title:'RACI operating model', problem:'Roles and expectations between the contract managers and their operational support were unclear, which created friction, ownership wasn\'t clear and heavy dependence on individuals.', result:'Defined a clear way of working: who owns what, how issues escalate, and where each role adds value. Supporting teams got autonomy for everyday work, freeing the team to focus on improvement and strategic topics. Impact: clear roles and expectations, less friction, and a foundation that scales without relying on single people.', tools:['RACI','Change mgmt'] },
        { title:'Leading outsourcing transition', problem:'Team was being transferred to an external outsourcing partner, with real risk to continuity, morale and client relationships.', result:'Designed and facilitated a 15-person leadership workshop aligning everyone on what a good transition looks like. In parallel, managed coverage, knowledge risks and built continuity plans. Impact: a leadership team aligned on definition of success and how to reach it, zero disruption for the customer.', tools:['Workshop design','Continuity planning'] },
        { title:'Process improvements', problem:'Customers used to send their requests by email, which then had to be handled and re-entered manually across our systems.', result:'Drove the rollout of a digital platform where customers submit requests directly: the request flows automatically into our tools, the workflow is digitalized and automated, and customers can track progress themselves. Impact: a faster, more transparent process with far less manual, error-prone work, and real visibility for customers.', tools:['Digital platform','Workflow automation'] }
      ] },
    { num:'02', rotation:true, company:'Orange Business', country:'Malaysia', years:'2024 – 2025',
      title:'Continuous Improvement Specialist',
      oneLine:'I looked for inefficiencies in service delivery and operations, designed solutions and made sure they were actually adopted.',
      projects:[
        { title:'AI summarization of order history', problem:'PMs and decision-makers worked through long order histories and comment threads just to understand what was going on. Slow, inconsistent, a regular source of escalations.', result:'Identified the opportunity and built an automation solution that uses AI to process long order histories and provided quick order summaries, a timeline, the latest changes, and root-cause analysis of any issue. Results: Faster answers, less digging, everyone working from the same picture.', tools:['Generative AI','Prompt design','RPA'] },
        { title:'From firefighting to prevention', problem:'The team reacted to escalations only once they\'d happened: stressful and expensive to fix.', result:'Built risk-scoring logic for open orders, a way to flag the risky ones, and a clear process for what to do when something went red. Results: Moved from firefighting towards prevention. The team can see risk coming and act earlier.', tools:['Power BI','Risk management','Process design'] },
        { title:'Delivery team productivity', problem:'Productivity wasn\'t reaching the global target or peer-region benchmark.', result:'Applied DMAIC: problem statement and goal, root-cause analysis, validated hypotheses, scenario projections, improvement suggestions, implementation and measurement. Productivity target hit within six months.', tools:['DMAIC','Root-cause analysis'] },
        { title:'Quality at scale', problem:'Incorrect orders caused delivery delays, delayed revenue and customer dissatisfaction.', result:'Set up qualitative parameters and proper monitoring, with analysis of what was causing the issues. Results: Targeted improvement actions addressing the main drivers of errors.', tools:['Quality monitoring','Process design'] },
        { title:'Team upskilling strategy', problem:'No clear view of team skills versus the services offered across APAC; training wasn\'t aligned to business needs.', result:'Mapped where people actually were, identified gaps against targets, and set out an upskilling strategy. Impact: a clearer direction for developing people, and a team better prepared to deliver.', tools:['Skills mapping','L&D strategy'] }
      ] },
    { num:'03', rotation:false, company:'Orange', country:'Slovakia', years:'2023 – 2024',
      title:'Digital Web & Media Analyst',
      oneLine:'I analyzed customer digital journeys and built the analytics and dashboards behind them, turning what I found into experiments that lifted online conversion.',
      projects:[
        { title:'Metrics hub', problem:'Metrics were used across dashboards but defined inconsistently. People avoided the dashboards because they didn\'t know how the numbers were calculated. No trust, no consistent interpretation.', result:'Built central metrics documentation that unified definitions across dashboards. A more data-driven culture and reliable data. Analysts could reuse definitions instead of redefining each time, and trust in reporting improved.', tools:['GA4','GTM','Looker Studio'] },
        { title:'Conversion drop-off analysis', problem:'Customers were dropping out along key journeys on the website, but it wasn\'t clear where or why, so improvement efforts were spread thin instead of aimed at what mattered.', result:'Prioritized the customer journeys by their contribution to sales, mapped the drop-off points, and turned those findings into concrete experiments to move more customers through each step. Impact: improvement work focused where it paid off, with experiments designed to lift online conversion.', tools:['Journey analysis','Experimentation','CRO'] }
      ] },
    { num:'04', rotation:false, company:'Orange', country:'Slovakia', years:'2020 – 2023',
      title:'Digital Marketing Specialist',
      oneLine:'I led projects to improve digital customer experience and ran the internal email marketing team.',
      projects:[
        { title:'Lead generation from scratch', problem:'There was no way for non-customers to subscribe to Orange news, the website had no channel to capture people interested in the brand, so a whole audience was slipping away.', result:'Built the lead-generation flow end to end: a contact database, a sign-up pop-up, onboarding and campaign email templates, and the opt-out logic behind it. Impact: a new owned channel to collect and nurture leads, and a repeatable way to keep them engaged.', tools:['Email marketing','CRM','Campaign design'] },
        { title:'Email template redesign', problem:'After two years, our email template no longer met current design standards: it looked dated and didn\'t cover the use cases we actually needed.', result:'Led the redesign end to end: collecting template examples and best practices, mapping the problems with the existing one, defining new use cases, then running several rounds of feedback to align multiple stakeholders before we coded and rolled out the new template. Impact: a modern, on-standard template that fit real campaign needs and became the new default for the team.', tools:['Email marketing','Stakeholder alignment','Project ownership'] }
      ] }
  ];

  var state = {
    visited: new Set(['landing']),
    current: 'landing',
    timer: 30,
    timing: false,
    wide: window.innerWidth >= 1080
  };

  var seen = new Set();
  var lastNav = 0;
  var timerInterval = null;

  function anim(id){
    if (seen.has(id)) return '';
    seen.add(id);
    return 'animation:cardIn .55s cubic-bezier(.22,.61,.36,1) both;';
  }
  function connector(){
    return '<div style="display:flex;justify-content:center;padding:5px 0;"><div style="width:2px;height:52px;background:#D3D1C6;"></div></div>';
  }
  function frontier(){
    var f = new Set();
    edges.forEach(function(e){ if (state.visited.has(e[0]) && !state.visited.has(e[1])) f.add(e[1]); });
    return f;
  }
  function isReachable(id){ return state.visited.has(id) || frontier().has(id); }

  function proj(x,y,W,H,px,py){
    return [ px + (x-bounds.minX)/(bounds.maxX-bounds.minX)*(W-2*px), py + (y-bounds.minY)/(bounds.maxY-bounds.minY)*(H-2*py) ];
  }

  // ---------- navigation / state transitions ----------

  function navigate(id){
    var now = Date.now();
    if (lastNav && now - lastNav < 90) return;
    lastNav = now;
    if (!isReachable(id)) return;
    state.visited.add(id);
    state.current = id;
    state.timing = false;
    clearInterval(timerInterval);
    if (id === 'speed'){
      state.timer = 30; state.timing = true;
      timerInterval = setInterval(function(){
        if (state.timer <= 1){ clearInterval(timerInterval); state.timer = 0; state.timing = false; updateTimerDisplay(); return; }
        state.timer -= 1; updateTimerDisplay();
      }, 1000);
    }
    renderAll(true);
  }

  function updateTimerDisplay(){
    var t = state.timer;
    var strEl = document.querySelector('[data-timer-str]');
    if (strEl) strEl.textContent = '0:' + (t < 10 ? '0'+t : t);
    var doneEl = document.querySelector('[data-speed-done]');
    if (doneEl) doneEl.style.display = (!state.timing && state.timer === 0) ? '' : 'none';
  }

  // ---------- render: card flow ----------

  function renderAll(scrollToCur){
    var scrollEl = document.getElementById('scroll-el');
    var savedTop = scrollEl.scrollTop;
    document.getElementById('flow-inner').innerHTML = renderFlow();
    renderMinimapDock();
    if (state.visited.has('work')){ initWorkObservers(); schedulePillbarUpdate(); }
    if (scrollToCur) scrollToCurrent();
    else scrollEl.scrollTop = savedTop;
  }

  function scrollToCurrent(){
    var go = function(){
      requestAnimationFrame(function(){ requestAnimationFrame(function(){
        var el = document.getElementById('n-'+state.current);
        var scrollEl = document.getElementById('scroll-el');
        if (!el || !scrollEl) return;
        var top = el.getBoundingClientRect().top - scrollEl.getBoundingClientRect().top + scrollEl.scrollTop - 84;
        scrollEl.scrollTo({top: Math.max(0, top), behavior:'smooth'});
      }); });
    };
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(go);
    else go();
  }

  function renderWorkCard(){
    var introHtml = '<div style="padding:clamp(26px,4.4vw,42px) clamp(15px,4vw,26px) 6vh;">'
      + '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;">work</div>'
      + '<h2 style="font-family:\'Space Grotesk\',sans-serif;font-weight:600;font-size:clamp(28px,5vw,40px);letter-spacing:-.02em;margin:0;max-width:18ch;">Four positions, one thread.</h2>'
      + '</div>';

    var listHtml = '<div style="padding:0 clamp(15px,4vw,26px);border-top:1px solid #E4E2D8;">'
      + roles.map(function(r,i){
          var gradBadge = r.rotation ? '<span class="pos-badge">graduate program</span>' : '';
          return '<button class="pos-row" data-scrollto="wpos-'+i+'">'
            + '<span class="n">'+r.num+'</span>'
            + '<span><span class="t">'+r.title+gradBadge+'</span><span class="sub">'+r.company+' · '+r.country+'</span></span>'
            + '<span class="y">'+r.years+'</span>'
            + '</button>';
        }).join('')
      + '</div>';

    var pillbarHtml = '<div class="pos-pillbar">'
      + roles.map(function(r,i){ return '<button class="pos-pill" data-scrollto="wpos-'+i+'" data-pill-idx="'+i+'">'+r.num+' · '+r.title+'</button>'; }).join('')
      + '</div>';

    var positionsHtml = roles.map(function(r,i){
      var gradBadge = r.rotation ? '<span class="grad">graduate program</span><br>' : '';
      var opener = '<div id="wpos-'+i+'" class="pos-opener">'
        + '<div class="inner">'
        +   '<span class="n">Position '+r.num+' / '+roles.length+'</span>'
        +   gradBadge
        +   '<h2'+(i===0?' id="work-first-title"':'')+'>'+r.title+'</h2>'
        +   '<div class="meta">'+r.company+' · '+r.country+' · '+r.years+'</div>'
        +   '<p class="desc">'+r.oneLine+'</p>'
        +   (r.projects.length ? '<span class="down">Projects ↓</span>' : '')
        + '</div>'
        + '</div>';

      var rail = '<aside class="pos-rail"><ol>'
        + r.projects.map(function(p,j){
            return '<li><button data-scrollto="wproj-'+i+'-'+j+'" data-rail-pos="'+i+'" data-rail-idx="'+j+'"><span class="n">'+String(j+1).padStart(2,'0')+'</span><span>'+p.title+'</span></button></li>';
          }).join('')
        + '</ol></aside>';

      var stream = '<div class="pos-stream">'
        + r.projects.map(function(p,j){
            var tools = p.tools.map(function(t){ return '<span>'+t+'</span>'; }).join('');
            return '<article id="wproj-'+i+'-'+j+'" data-project-pos="'+i+'" data-project-idx="'+j+'">'
              + '<span class="tag">'+r.num+' '+r.title+' · Project '+String(j+1).padStart(2,'0')+'</span>'
              + '<h3>'+p.title+'</h3>'
              + '<p class="problem">'+p.problem+'</p>'
              + '<p class="result">'+p.result+'</p>'
              + '<div class="tools">'+tools+'</div>'
              + '</article>';
          }).join('')
        + '</div>';

      return opener + (r.projects.length ? '<div class="pos-work">'+rail+stream+'</div>' : '');
    }).join('');

    var ctaHtml = '<div id="work-nav-end"></div>'
      + '<div style="display:flex;justify-content:center;padding:9vh clamp(15px,4vw,26px) clamp(26px,4.4vw,42px);">'

  function initWorkObservers(){
    if (workPosObserver){ workPosObserver.disconnect(); workPosObserver = null; }

    if (!articles.length) return;
    var pills = document.querySelectorAll('.pos-pill');

      entries.forEach(function(en){
        if (!en.isIntersecting) return;
        var pos = en.target.getAttribute('data-project-pos');
        var idx = en.target.getAttribute('data-project-idx');
        pills.forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-pill-idx') === pos); });

        });
      });
    }, {rootMargin:'-40% 0px -55% 0px'});
    articles.forEach(function(a){ workPosObserver.observe(a); });

  function renderMinimapDock(){
    var dock = document.getElementById('minimap-dock');
    if (!state.wide){ dock.innerHTML = ''; return; }
    var W=138, H=214, px=14, py=14;
    var visited = state.visited, front = frontier();
    var pos = {};
    order.forEach(function(id){ var n = nodes[id]; pos[id] = proj(n.x,n.y,W,H,px,py); });
    var lines = edges.map(function(e){
      var a=e[0], b=e[1], on = visited.has(a) && visited.has(b);
      return '<line x1="'+pos[a][0]+'" y1="'+pos[a][1]+'" x2="'+pos[b][0]+'" y2="'+pos[b][1]+'" stroke="'+(on?'var(--accent)':'#d8d6cc')+'" stroke-width="'+(on?1.6:1)+'" opacity="'+(on?.8:.5)+'" marker-end="url(#mm-ar)"/>';
    }).join('');
    var shapes = order.map(function(id){
      var p=pos[id], t=nodes[id].type, vis=visited.has(id), fr=front.has(id), cur=state.current===id, reach=vis||fr;
      var fill = cur?'var(--accent)':vis?'#17171C':fr?'#fff':'#e4e2d8';
      var stroke = cur?'var(--accent)':fr?'var(--decision)':vis?'#17171C':'#cbc9bf';
      var shape;
      if (t==='decision'){ var s=6.2; shape = '<rect x="'+(p[0]-s)+'" y="'+(p[1]-s)+'" width="'+(s*2)+'" height="'+(s*2)+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1.3" transform="rotate(45 '+p[0]+' '+p[1]+')"/>'; }
      else if (t==='term'){ shape = '<rect x="'+(p[0]-10)+'" y="'+(p[1]-5)+'" width="20" height="10" rx="5" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1.3"/>'; }
      else { shape = '<rect x="'+(p[0]-9)+'" y="'+(p[1]-5.5)+'" width="18" height="11" rx="2" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1.3"/>'; }
      var ring = cur ? '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="7" fill="var(--accent)" opacity=".4" style="transform-origin:'+p[0]+'px '+p[1]+'px;animation:ringPulse 1.7s ease-out infinite;"/>' : '';
      var title = reach ? '<title>'+labels[id]+'</title>' : '';
      return '<g style="cursor:'+(reach?'pointer':'default')+';" '+(reach?'data-map-nav="'+id+'"':'')+'>'+ring+shape+title+'</g>';
    }).join('');
    dock.innerHTML = '<div style="position:fixed;left:18px;bottom:18px;z-index:190;width:162px;background:rgba(255,255,255,.82);backdrop-filter:blur(8px);border:1px solid #E0DED4;border-radius:16px;padding:11px 11px 8px;box-shadow:0 12px 34px -18px rgba(20,20,32,.4);">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">'
      +   '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#9a988e;">Process map</span>'
      + '</div>'
      + '<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block;overflow:visible;">'
      +   '<defs><marker id="mm-ar" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#c2c0b6"/></marker></defs>'
      +   '<g>'+lines+'</g><g>'+shapes+'</g>'
      + '</svg>'
      + '</div>';
  }

  // ---------- event delegation ----------

  document.getElementById('stage').addEventListener('click', function(e){
    var nav = e.target.closest('[data-nav]');
    if (nav){ navigate(nav.getAttribute('data-nav')); return; }
    var act = e.target.closest('[data-action]');
    if (act){
      var a = act.getAttribute('data-action');
      if (a === 'email') window.location.href = 'mailto:'+EMAIL;
      return;
    }
    var scrollTo = e.target.closest('[data-scrollto]');
    if (scrollTo){
      var target = document.getElementById(scrollTo.getAttribute('data-scrollto'));
      if (target) target.scrollIntoView({block:'start'});
      return;
    }
    var mapNav = e.target.closest('[data-map-nav]');
    if (mapNav){ var id = mapNav.getAttribute('data-map-nav'); if (isReachable(id)) navigate(id); return; }
  });

  window.addEventListener('resize', function(){
    var newWide = window.innerWidth >= 1080;
    if (newWide !== state.wide){ state.wide = newWide; renderMinimapDock(); }
    syncBarHeight();
    schedulePillbarUpdate();
  });

  document.getElementById('scroll-el').addEventListener('scroll', schedulePillbarUpdate, {passive:true});

  function syncBarHeight(){
    var topbar = document.getElementById('topbar');
    if (!topbar) return;
    var h = Math.ceil(topbar.getBoundingClientRect().height);
    if (h > 0) document.getElementById('stage').style.setProperty('--bar-h', h + 'px');
  }

  // ---------- bootstrap ----------

  syncBarHeight();
  renderAll(false);
})();
</script>
</body>
</html>
